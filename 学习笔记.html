<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记 - 老拜</title>
    <style>
        :root {
            --page-bg: #111111; --module-bg: #141210; --content-bg: #151311;
            --border-color: #2a2826; --text-main: #f5f1eb; --text-sub: #ddd5cc;
            --text-dim: #99938d; --accent-color: #c87e4f; --hover-bg: #1a1816;
        }
        * { box-sizing: border-box; }
        body { font-family: "Helvetica Neue","PingFang SC","Microsoft YaHei",Arial,sans-serif; background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; min-height: 100vh; }

        /* 密码锁屏 */
        .lock-screen { position: fixed; inset: 0; background: var(--page-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 24px; }
        .lock-icon { font-size: 36px; margin-bottom: 20px; opacity: 0.6; }
        .lock-title { font-size: 18px; font-weight: 500; letter-spacing: 2px; margin-bottom: 6px; }
        .lock-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; }
        .lock-input-wrap { display: flex; gap: 10px; width: 100%; max-width: 320px; }
        .lock-input { flex: 1; background: var(--content-bg); border: 1px solid var(--border-color); color: var(--text-main); font-size: 15px; padding: 12px 16px; border-radius: 12px; outline: none; letter-spacing: 2px; transition: border-color 0.2s; }
        .lock-input:focus { border-color: var(--accent-color); }
        .lock-input.error { border-color: #c0392b; animation: shake 0.3s; }
        .lock-btn { background: var(--accent-color); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 14px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
        .lock-btn:hover { opacity: 0.85; }
        .lock-hint { font-size: 12px; color: var(--text-dim); margin-top: 16px; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

        /* 内容区 */
        .content-wrap { display: none; }
        .content-wrap.unlocked { display: block; }

        /* 导航 */
        .navbar { background: var(--module-bg); padding: 0 16px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .nav-title { font-weight: 600; font-size: 18px; letter-spacing: 2px; flex: 1; text-align: center; color: var(--text-dim); }
        .btn-nav { color: var(--text-main); font-size: 14px; font-weight: 500; border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 25px; background: transparent; cursor: pointer; transition: all 0.3s; text-decoration: none; }
        .btn-nav:hover { background: var(--hover-bg); }

        /* 笔记列表 */
        .main { max-width: 600px; margin: 0 auto; padding: 32px 20px 80px; }

        /* 分类标题 */
        .category-title { font-size: 12px; color: var(--accent-color); letter-spacing: 3px; margin: 32px 0 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .category-title:first-child { margin-top: 0; }

        /* 笔记条目 */
        .note-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; margin-bottom: 8px;
            background: var(--content-bg); border: 1px solid var(--border-color);
            border-radius: 12px; text-decoration: none;
            transition: all 0.2s; cursor: pointer;
        }
        .note-item:hover { background: var(--hover-bg); border-color: #44403c; }
        .note-item-left { display: flex; align-items: center; gap: 12px; }
        .note-icon { font-size: 16px; opacity: 0.7; }
        .note-name { font-size: 15px; color: var(--text-main); font-weight: 500; }
        .note-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
        .note-arrow { color: var(--text-dim); font-size: 18px; }

        /* 新增按钮提示 */
        .add-hint { text-align: center; padding: 20px; font-size: 13px; color: var(--text-dim); border: 1px dashed var(--border-color); border-radius: 12px; margin-top: 8px; }
    </style>
</head>
<body>

    <!-- 密码锁屏 -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">学习笔记</div>
        <div class="lock-sub">私人记录</div>
        <div class="lock-input-wrap">
            <input type="password" class="lock-input" id="pwdInput"
                placeholder="输入密码" onkeydown="if(event.key==='Enter') unlock()">
            <button class="lock-btn" onclick="unlock()">进入</button>
        </div>
        <div class="lock-hint" id="lockHint"></div>
    </div>

    <!-- 笔记内容 -->
    <div class="content-wrap" id="contentWrap">

        <div class="navbar">
            <div style="width: 80px;"></div>
            <div class="nav-title">学习笔记</div>
            <button class="btn-nav" onclick="lockAgain()">🔒 锁定</button>
        </div>

        <div class="main">

            <!-- 分类：CNC / G-code -->
            <div class="category-title">CNC · 数控加工</div>

            <a href="学习笔记/gcode基础.html" class="note-item">
                <div class="note-item-left">
                    <div class="note-icon">📄</div>
                    <div>
                        <div class="note-name">G-code 基础</div>
                        <div class="note-desc">常用指令、坐标系、进给速度</div>
                    </div>
                </div>
                <div class="note-arrow">›</div>
            </a>

            <a href="学习笔记/mach3设置.html" class="note-item">
                <div class="note-item-left">
                    <div class="note-icon">📄</div>
                    <div>
                        <div class="note-name">Mach3 设置</div>
                        <div class="note-desc">参数配置、归零、限位开关</div>
                    </div>
                </div>
                <div class="note-arrow">›</div>
            </a>

            <!-- 分类：3D打印 -->
            <div class="category-title">3D 打印</div>

            <a href="学习笔记/3d打印参数.html" class="note-item">
                <div class="note-item-left">
                    <div class="note-icon">📄</div>
                    <div>
                        <div class="note-name">切片参数</div>
                        <div class="note-desc">温度、速度、支撑、填充率</div>
                    </div>
                </div>
                <div class="note-arrow">›</div>
            </a>
            <!-- 分类：esp32学习笔记 -->
            <div class="category-title">自动控制</div>

            <a href="学习笔记/esp32学习笔记.html" class="note-item">
                <div class="note-item-left">
                    <div class="note-icon">📄</div>
                    <div>
                        <div class="note-name">esp32学习笔记</div>
                        <div class="note-desc">概况</div>
                    </div>
                </div>
                <div class="note-arrow">›</div>
            </a>
            <!-- 分类：激光雕刻 -->
            <div class="category-title">激光雕刻</div>

            <a href="学习笔记/激光参数.html" class="note-item">
                <div class="note-item-left">
                    <div class="note-icon">📄</div>
                    <div>
                        <div class="note-name">功率与速度</div>
                        <div class="note-desc">不同材料的参数记录</div>
                    </div>
                </div>
                <div class="note-arrow">›</div>
            </a>

            <!-- 分类：其他 -->
            <div class="category-title">其他</div>

            <div class="add-hint">新的笔记陆续添加中…</div>

        </div>
    </div>

<script>
    const PASSWORD = '0000';

    if (sessionStorage.getItem('notes_unlocked') === 'yes') {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('contentWrap').classList.add('unlocked');
    }

    function unlock() {
        const input = document.getElementById('pwdInput');
        const hint = document.getElementById('lockHint');
        if (input.value === PASSWORD) {
            sessionStorage.setItem('notes_unlocked', 'yes');
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('contentWrap').classList.add('unlocked');
        } else {
            input.classList.add('error');
            hint.textContent = '密码不对，再试试';
            hint.style.color = '#c0392b';
            setTimeout(() => { input.classList.remove('error'); input.value = ''; }, 500);
        }
    }

    function lockAgain() {
        sessionStorage.removeItem('notes_unlocked');
        document.getElementById('lockScreen').style.display = 'flex';
        document.getElementById('contentWrap').classList.remove('unlocked');
        document.getElementById('pwdInput').value = '';
        document.getElementById('lockHint').textContent = '';
    }
</script>
</body>
</html>
