<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老拜小筑 | LAOBAI</title>

<style>
body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: white;
}

.hero {
    height: 100vh;
    background: url('garden.jpg') no-repeat center center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
}

.hero-inner{
    position: relative;
    z-index: 1;
    max-width: 820px;
    padding: 20px;
    margin-top: -8vh; /* ✅ 你刚才的上移 */
}

/* 标题 */
h1{
    font-size: 46px;
    letter-spacing: 4px;
    margin-bottom: 10px;
}

/* LAOBAI */
.en{
    font-size: 14px;
    letter-spacing: 6px;
    opacity: 0.7;
    margin-bottom: 10px;
}

/* 英文描述 */
.sub-en{
    font-size: 14px;
    opacity: 0.75;
    margin-bottom: 40px;
}

/* 中文三行 */
.slogan{
    font-size: 20px;
    line-height: 2;
    margin-bottom: 60px;
}

/* 底部英文 */
.slogan-en{
    position: absolute;
    bottom: 40px;
    width: 100%;
    font-size: 12px;
    letter-spacing: 6px;
    opacity: 0.6;
}

/* ===== 光照动画核心 ===== */

.fade{
    opacity: 0;
    transform: translateY(18px);
    filter: blur(6px);
    text-shadow: 0 0 0 rgba(255,255,255,0);
    animation: lightReveal 4.2s ease forwards;
}

/* 出现节奏（慢慢来） */
.fade:nth-child(1){ animation-delay: 0.8s; }
.fade:nth-child(2){ animation-delay: 2.4s; }
.fade:nth-child(3){ animation-delay: 4.4s; }
.fade:nth-child(4){ animation-delay: 6.8s; }
.fade:nth-child(5){ animation-delay: 9.8s; }

@keyframes lightReveal{
    0%{
        opacity: 0;
        transform: translateY(18px);
        filter: blur(8px);
        text-shadow: 0 0 0 rgba(255,255,255,0);
    }
    35%{
        opacity: 0.18;
        transform: translateY(10px);
        filter: blur(5px);
        text-shadow: 0 0 8px rgba(255,255,255,0.12);
    }
    70%{
        opacity: 0.68;
        transform: translateY(3px);
        filter: blur(1.5px);
        text-shadow: 0 0 16px rgba(255,255,255,0.22);
    }
    100%{
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
        text-shadow: 0 0 0 rgba(255,255,255,0);
    }
}
</style>
</head>

<body>

<section class="hero">
    <div class="hero-inner">

        <h1 class="fade">老拜小筑</h1>

        <div class="en fade">LAOBAI</div>

        <div class="sub-en fade">A handmade place in Vancouver</div>

        <div class="slogan fade">
            <div>民谣轻轻唱</div>
            <div>院子慢慢长</div>
            <div>烟火渐渐香</div>
        </div>

        <div class="slogan-en fade">
            MUSIC · GARDEN · FIRE · LIFE
        </div>

    </div>
</section>

</body>
</html>
