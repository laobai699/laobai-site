<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老拜小筑 | LAOBAI</title>

<style>
body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: white;
}

/* 背景 */
.hero {
    height: 100vh;
    background: url('garden.jpg') no-repeat center center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* 遮罩 */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.28);
}

/* 内容整体 */
.hero-inner{
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px;

    /* ✅ 关键：整体上移（稳定版） */
    transform: translateY(-12vh);
}

/* 标题 */
h1{
    font-size: 46px;
    letter-spacing: 4px;
    margin-bottom: 10px;
}

/* 英文 LAOBAI */
.en{
    font-size: 14px;
    letter-spacing: 6px;
    opacity: 0.75;
    margin-bottom: 10px;
}

/* 英文描述 */
.sub-en{
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 40px;
}

/* 中文三行 */
.slogan{
    font-size: 20px;
    line-height: 2;
    margin-bottom: 60px;
}

/* 底部英文（强制一行） */
.slogan-en{
    position: absolute;
    bottom: 40px;
    width: 100%;
    font-size: 12px;
    letter-spacing: 6px;
    opacity: 0.7;
    white-space: nowrap;   /* ✅ 关键：不换行 */
}

/* ===== 光照动画（稳定版） ===== */

.fade{
    opacity: 0;
    filter: blur(6px);
    transform: translateY(10px);
    animation: lightReveal 3.2s ease forwards;
}

/* 节奏（修正不卡顿版） */
.fade:nth-of-type(1){ animation-delay: 0.2s; }
.fade:nth-of-type(2){ animation-delay: 1.4s; }
.fade:nth-of-type(3){ animation-delay: 2.8s; }
.fade:nth-of-type(4){ animation-delay: 4.6s; }
.fade:nth-of-type(5){ animation-delay: 6.8s; }

@keyframes lightReveal{
    0%{
        opacity: 0;
        filter: blur(8px);
        transform: translateY(12px);
    }
    40%{
        opacity: 0.4;
        filter: blur(4px);
    }
    70%{
        opacity: 0.85;
        filter: blur(1px);
    }
    100%{
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<section class="hero">
    <div class="hero-inner">

        <h1 class="fade">老拜小筑</h1>

        <div class="en fade">LAOBAI</div>

        <div class="sub-en fade">A handmade place in Vancouver</div>

        <div class="slogan fade">
            <div>民谣轻轻唱</div>
            <div>院子慢慢长</div>
            <div>烟火渐渐香</div>
        </div>

        <div class="slogan-en fade">
            MUSIC · GARDEN · FIRE · LIFE
        </div>

    </div>
</section>

</body>
</html>
