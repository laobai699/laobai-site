<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老拜小筑</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  background:#0f0f0f;
  color:#fff;
}

/* 第一屏 */
.hero{
  height:100vh;
  background-image:url("./garden.jpg");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  position:relative;
}

/* 轻微遮罩（让字更清晰） */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

/* 内容浮在遮罩上 */
.hero > *{
  position:relative;
}

.hero h1{
  font-size:56px;
  letter-spacing:6px;
  margin-bottom:20px;
}

.hero .en{
  font-size:14px;
  letter-spacing:8px;
  margin-bottom:30px;
  opacity:0.7;
}

.hero .slogan{
  font-size:20px;
  line-height:2;
  opacity:0.9;
}

/* 向下提示 */
.scroll{
  position:absolute;
  bottom:30px;
  font-size:12px;
  opacity:0.6;
}

/* 第二屏 */
.section{
  padding:80px 20px;
  background:#111;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
  max-width:900px;
  margin:0 auto;
}

.card{
  border:1px solid rgba(255,255,255,0.15);
  padding:30px;
  border-radius:10px;
  transition:0.3s;
  text-decoration:none;
  color:white;
}

.card:hover{
  background:rgba(255,255,255,0.08);
}

.card h2{
  font-size:20px;
  margin-bottom:10px;
}

.card p{
  font-size:13px;
  opacity:0.7;
}

/* 第三屏（你的那句） */
.about{
  max-width:700px;
  margin:0 auto;
  line-height:2;
  font-size:18px;
  opacity:0.88;
  letter-spacing:2px;
}

/* 底部 */
.footer{
  text-align:center;
  padding:40px 10px;
  font-size:12px;
  opacity:0.5;
}

</style>

</head>

<body>

<!-- 第一屏 -->
<div class="hero">

  <h1>老拜小筑</h1>
  <div class="en">LAOBAI</div>

  <div class="slogan">
    民谣慢慢唱出来<br>
    院子慢慢长出来<br>
    烟火慢慢盛出来
  </div>

  <div class="scroll">↓ 向下看看</div>

</div>

<!-- 第二屏 -->
<div class="section">

  <div class="grid">

    <a class="card" href="songs.html">
      <h2>老拜有谱</h2>
      <p>弹唱 · 歌谱 · 民谣</p>
    </a>

    <a class="card" href="coming.html">
      <h2>老拜美食</h2>
      <p>烤全羊 · 烟火气</p>
    </a>

    <a class="card" href="coming.html">
      <h2>老拜工坊</h2>
      <p>CNC · 激光 · 3D打印 · 凸版印刷</p>
    </a>

    <a class="card" href="coming.html">
      <h2>老拜小筑</h2>
      <p>院子 · 茶屋 · 四季</p>
    </a>

  </div>

</div>

<!-- 第三屏 -->
<div class="section">

  <div class="about">
    十年手作的小筑，慢慢长出来的院子。<br><br>
    有琴有茶有劳作<br>
    油盐柴米小折腾
  </div>

</div>

<!-- 底部 -->
<div class="footer">
  LAOBAI · VANCOUVER
</div>

</body>
</html>
