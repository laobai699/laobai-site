<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>与AI共建 - 老拜小筑</title>
    <style>
        :root { 
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-sub: #ddd5cc;
            --text-dim: #99938d;
            --accent-color: #c87e4f;
            --hover-bg: #1a1816;
        }
        body { 
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        .navbar { 
            background: var(--module-bg); padding: 0 24px; height: 72px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-home { 
            text-decoration: none; color: var(--text-main);
            font-size: 14px; font-weight: 500;
            border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 25px;
            transition: all 0.3s;
        }
        .btn-home:hover { background: var(--hover-bg); border-color: #44403c; }
        .nav-title { 
            font-size: 22px; font-weight: 600; letter-spacing: 3px; 
            text-align: center; flex: 1;
        }

        /* 顶部介绍 */
        .intro { max-width: 550px; margin: 0 auto; padding: 36px 20px 24px; }
        .intro-title {
            font-size: 13px; color: var(--accent-color); letter-spacing: 3px;
            margin-bottom: 14px;
        }
        .intro-text {
            font-size: 15px; color: var(--text-sub); line-height: 2;
        }

        /* 文章列表 */
        .article-list { max-width: 550px; margin: 0 auto; padding: 0 20px 100px; }

        .article-item {
            background: var(--content-bg); margin-bottom: 10px;
            border-radius: 14px; display: flex; align-items: center;
            transition: all 0.3s; border: 1px solid var(--border-color);
            text-decoration: none; color: inherit;
            padding: 18px 24px; gap: 16px;
        }
        .article-item:hover { transform: translateY(-2px); background: var(--hover-bg); border-color: #44403c; }
        .article-item.coming { opacity: 0.4; pointer-events: none; cursor: default; }

        .article-num {
            font-size: 12px; color: var(--accent-color);
            font-weight: 600; letter-spacing: 1px;
            flex-shrink: 0; width: 28px;
        }
        .article-info { flex: 1; }
        .article-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
        .article-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
        .article-arrow { color: var(--text-dim); font-size: 16px; flex-shrink: 0; }

        /* 底部 */
        .growing-item {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--content-bg);
            border-top: 1px solid var(--border-color);
            color: var(--text-dim);
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; letter-spacing: 2px;
            padding: 16px 24px; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="btn-home">返回首页</a>
        <div class="nav-title">与AI共建</div>
        <div style="width: 80px;"></div>
    </div>

    <div class="intro">
        <div class="intro-title">BUILDING WITH AI</div>
        <div class="intro-text">
            一个不懂代码的人，和几个AI，把这里建了起来。<br>
            这里记录的不是教程，而是过程和迎接AI时代的心路历程。
        </div>
    </div>

    <div class="article-list">

        <a href="building/01.html" class="article-item">
            <div class="article-num">01</div>
            <div class="article-info">
                <div class="article-title">这是我的小房子</div>
                <div class="article-desc">站在刚建好的门口，说几句心里话</div>
            </div>
            <div class="article-arrow">›</div>
        </a>

        <div class="article-item coming">
            <div class="article-num">02</div>
            <div class="article-info">
                <div class="article-title">慢慢生长中…</div>
                <div class="article-desc">更多故事还在整理</div>
            </div>
            <div class="article-arrow">›</div>
        </div>

        <div class="article-item coming">
            <div class="article-num">03</div>
            <div class="article-info">
                <div class="article-title">慢慢生长中…</div>
                <div class="article-desc">更多故事还在整理</div>
            </div>
            <div class="article-arrow">›</div>
        </div>

    </div>

    <div class="growing-item">
        🌱 🌱 🌱 持续更新中 ... 🌱 🌱 🌱
    </div>

</body>
</html>
