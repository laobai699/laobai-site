<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>与AI共建 - 老拜小筑</title>
    <style>
        :root { 
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-sub: #ddd5cc;
            --text-dim: #99938d;
            --accent-color: #c87e4f;
            --hover-bg: #1a1816;
        }
        html[data-theme="light"] {
            --page-bg: #f0ebe3;
            --module-bg: #faf6f0;
            --content-bg: #faf6f0;
            --border-color: #ddd5c8;
            --text-main: #2a2218;
            --text-sub: #4a4238;
            --text-dim: #7a7268;
            --accent-color: #b86e3f;
            --hover-bg: #e8e0d8;
        }
        body { 
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        .navbar { 
            background: var(--module-bg); padding: 0 24px; height: 72px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-home { 
            text-decoration: none; color: var(--text-main);
            font-size: 14px; font-weight: 500;
            border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 25px;
            transition: all 0.3s;
        }
        .btn-home:hover { background: var(--hover-bg); border-color: #44403c; }
        .nav-title { 
            font-size: 22px; font-weight: 600; letter-spacing: 3px; 
            text-align: center; flex: 1;
        }

        /* 顶部介绍 */
        .intro { max-width: 550px; margin: 0 auto; padding: 36px 20px 24px; }
        .intro-title {
            font-size: 13px; color: var(--accent-color); letter-spacing: 3px;
            margin-bottom: 14px;
        }
        .intro-text {
            font-size: 15px; color: var(--text-sub); line-height: 2;
        }

        /* 文章列表 */
        .article-list { max-width: 550px; margin: 0 auto; padding: 0 20px 100px; }

        .article-item {
            background: var(--content-bg); margin-bottom: 10px;
            border-radius: 14px; display: flex; align-items: center;
            transition: all 0.3s; border: 1px solid var(--border-color);
            text-decoration: none; color: inherit;
            padding: 18px 24px; gap: 16px;
        }
        .article-item:hover { transform: translateY(-2px); background: var(--hover-bg); border-color: #44403c; }
        .article-item.coming { opacity: 0.4; pointer-events: none; cursor: default; }

        .article-num {
            font-size: 12px; color: var(--accent-color);
            font-weight: 600; letter-spacing: 1px;
            flex-shrink: 0; width: 28px;
        }
        .article-info { flex: 1; }
        .article-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
        .article-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
        .article-arrow { color: var(--text-dim); font-size: 16px; flex-shrink: 0; }

        /* 底部 */
        .growing-item {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--content-bg);
            border-top: 1px solid var(--border-color);
            color: var(--text-dim);
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; letter-spacing: 2px;
            padding: 16px 24px; z-index: 100;
        }
    </style>
</head>
<body>

            <div class="article-arrow">›</div>

        <a href="building/04AI天团.html" class="article-item">

<script>
    function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-toggle').textContent = isDark ? '深色' : '浅色';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.addEventListener('DOMContentLoaded', function() {
                const btn = document.getElementById('theme-toggle');
                if (btn) btn.textContent = '深色';
            });
        }
    })();
</script>
