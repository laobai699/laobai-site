<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>老拜美食</title>
<style>
:root{
  --bg:#0f0f0f;
  --panel:rgba(255,255,255,.035);
  --line:rgba(255,255,255,.1);
  --text:#ffffff;
  --muted:rgba(255,255,255,.72);
  --soft:rgba(255,255,255,.5);
  --radius:18px;
  --hero-image:url('food/images/covernew/cover_02.jpg');
  --hero-text:rgba(255,255,255,.90);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.9;
}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}
.page{min-height:100vh;}
.hero{
  min-height:100vh;
  position:relative;
  overflow:hidden;
  background:#d8c19b;
  padding:26px 18px 34px;
}
.hero::before{
  content:"";
  position:absolute;
  inset:-3%;
  background:
    linear-gradient(to bottom, rgba(34,24,16,.10), rgba(18,12,8,.18)),
    var(--hero-image) center center / cover no-repeat;
  transform:scale(.95);
  transform-origin:center center;
  z-index:0;
}
.hero-inner{
  min-height:calc(100vh - 60px);
  width:100%;
  margin:0 auto;
  position:relative;
  z-index:1;
}
.back-btn{
  position:absolute;
  top:max(8px, env(safe-area-inset-top));
  left:0;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:88px;
  height:40px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.92);
  font-size:14px;
  letter-spacing:1px;
  backdrop-filter:blur(3px);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}
.hero-poem{
  position:absolute;
  top:10vh;
  left:24px;
  color:var(--hero-text);
  text-shadow:0 1px 6px rgba(0,0,0,.20);
}
.hero-poem p{
  margin:0;
  font-family:"STSong","Songti SC","Noto Serif SC","Source Han Serif SC","PingFang SC","Microsoft YaHei",serif;
  font-size:clamp(22px, 4.9vw, 34px);
  line-height:1.95;
  letter-spacing:.08em;
  /* 重点修复：把强制不换行放在全局基础样式里，搞定平板窜行 */
  white-space: nowrap; 
}
.hero-poem p + p{margin-top:.18em;}
.hero-poem .poem-gap{margin-top:1.02em;}
.scroll-tip{
  position:absolute;
  left:50%;
  bottom:max(28px, calc(env(safe-area-inset-bottom) + 16px));
  transform:translateX(-50%);
  font-size:13px;
  color:var(--hero-text);
  letter-spacing:2px;
  animation:bounceUp 1.8s infinite;
  text-shadow:0 1px 6px rgba(0,0,0,.22);
  white-space:nowrap;
}
@keyframes bounceUp{
  0%,100%{transform:translateX(-50%) translateY(0);opacity:.76;}
  50%{transform:translateX(-50%) translateY(-6px);opacity:1;}
}
.main{
  width:min(1080px, 92vw);
  margin:0 auto;
  padding:46px 0 76px;
}
.section-intro{
  text-align:center;
  margin:0 0 20px;
}
.section-intro h2{
  margin:0 0 10px;
  font-size:22px;
  font-weight:500;
  letter-spacing:3px;
}
.section-intro p{
  margin:0;
  color:var(--muted);
  font-size:14px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:14px;
  align-items:stretch;
}
.entry-link{display:block;}
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 26px rgba(0,0,0,.18);
  transition:.25s ease;
  backdrop-filter: blur(2px);
  height:100%;
  display:flex;
  flex-direction:column;
}
.entry-link:hover .card{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.18);
}
.card-cover{
  aspect-ratio:4/5;
  background:#1a1a1a center/cover no-repeat;
  position:relative;
  flex:0 0 auto;
}
.card-cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.32), rgba(0,0,0,.06));
}
.card-body{
  padding:10px 12px 12px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  text-align:center;
  min-height:62px;
}
.card h3{
  margin:0;
  font-size:clamp(18px, 4.6vw, 22px);
  font-weight:500;
  letter-spacing:1px;
  line-height:1.28;
}
.card .en{
  margin-top:3px;
  font-size:11px;
  color:rgba(255,255,255,.94);
  letter-spacing:1.6px;
  text-transform:uppercase;
  line-height:1.2;
}
.footer-space{
  text-align:center;
  padding:40px 12px 10px;
  color:var(--soft);
  font-size:12px;
  letter-spacing:2px;
  opacity:.8;
}
@media (max-width:699px){
  .hero{padding:22px 16px 34px;}
  .hero::before{inset:-3%; transform:scale(.94);}
  .hero-inner{min-height:calc(100vh - 56px);}
  .back-btn{
    top:max(6px, env(safe-area-inset-top));
    left:0;
    min-width:82px;
    height:38px;
    font-size:13px;
  }
  .hero-poem{
    top:9.5vh;
    left:14px;
    width:min(11em, 74vw);
  }
  .scroll-tip{
    bottom:max(34px, calc(env(safe-area-inset-bottom) + 20px));
    font-size:12px;
  }
  .main{width:min(1080px, 94vw);}
}

@media (min-width:700px){
  .hero {
    max-width: 480px; 
    margin: 0 auto;
    border-left: 1px solid rgba(255,255,255,0.06);
    border-right: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
  }
  .hero-poem p {
    font-size: 30px;
  }
  .main{width:min(980px, 90vw); padding-top:50px;}
  .grid{grid-template-columns:repeat(2, minmax(0, 1fr)); gap:20px;}
  .card h3{font-size: 20px;}
}

@media (min-width:1100px){
  .main{width:min(1080px, 88vw);}
  .grid{grid-template-columns:repeat(3, minmax(0, 1fr));}
}
</style>
</head>
<body>
<div class="page">

  <main class="main">

    <section class="grid">
      <a class="entry-link" href="food/老拜烤全羊.html">

          <div class="card-body">

      <a class="entry-link" href="coming.html">

        </article>
      </a>

      <a class="entry-link" href="coming.html">
        <article class="card">
          <div class="card-cover" style="background-image:url('food/images/covernew/fish.jpg');"></div>
          <div class="card-body">
            <h3>一条鱼</h3>
          </div>
        </article>
      </a>

      <a class="entry-link" href="coming.html">
        <article class="card">
          <div class="card-cover" style="background-image:url('food/images/covernew/chiken.jpg');"></div>
          <div class="card-body">
            <h3>一只鸡</h3>
          </div>
        </article>
      </a>

      <a class="entry-link" href="coming.html">
        <article class="card">

          </div>
        </article>
      </a>

      <a class="entry-link" href="coming.html">
        <article class="card">
          <div class="card-cover" style="background-image:url('food/images/covernew/colddishes.jpg');"></div>

      <a class="entry-link" href="coming.html">
        <article class="card">
          <div class="card-cover" style="background-image:url('food/images/covernew/slowgrowing.jpg');"></div>

            <h3>慢慢生长</h3>
          </div>
        </article>
      </a>

      <a class="entry-link" href="coming.html">
        <article class="card">
          <div class="card-cover" style="background-image:url('food/images/covernew/grandfather.jpg');"></div>
          <div class="card-body">
            <h3>跨界</h3>
          </div>
        </article>
      </a>
    </section>

    <div class="footer-space">©2026.3 LAOBAI.LIVE 版权所有</div>
  </main>
</div>
</body>
</html>
