<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老拜有谱 - 单曲歌谱页原型</title>
</head>
<body>

  <!-- 整页容器 -->
  <div class="song-page">

    <!-- 顶部控制条：单行 -->
    <header class="top-bar">
      <div class="top-left">
        <button type="button" class="back-btn">返回列表</button>
        <span class="song-title">把酒问月</span>
        <span class="song-artist">赵照</span>
      </div>

      <div class="top-center">
        <button type="button" class="transpose-btn">-</button>
        <span class="current-key">当前调：G</span>
        <button type="button" class="transpose-btn">+</button>
      </div>

      <div class="top-right">
        <button type="button" class="toggle-degree-btn">级数：关</button>
      </div>
    </header>

    <!-- 主歌谱区域：页面最大 -->
    <main class="score-area">

      <!-- 歌曲基础信息（可先简化保留） -->
      <section class="song-meta">
        <div>原调：G</div>
        <div>当前调：G</div>
      </section>

      <!-- 歌谱显示区 -->
      <section class="score-content">

        <!-- 段落示例 -->
        <div class="section-block">
          <div class="section-label">主歌</div>

          <div class="score-line">
            <div class="chord-line">G　　　　　　D　　　　　　Em　　　　　C</div>
            <div class="lyric-line">青天有月来几时　我今停杯一问之</div>
            <div class="degree-line">Ⅰ　　　　　　Ⅴ　　　　　　Ⅵm　　　　　Ⅳ</div>
          </div>

          <div class="score-line">
            <div class="chord-line">G　　　　　　D　　　　　　C　　　　　　D</div>
            <div class="lyric-line">人攀明月不可得　月行却与人相随</div>
            <div class="degree-line">Ⅰ　　　　　　Ⅴ　　　　　　Ⅳ　　　　　　Ⅴ</div>
          </div>
        </div>

        <div class="section-block">
          <div class="section-label">副歌</div>

          <div class="score-line">
            <div class="chord-line">Em　　　　　Bm　　　　　C　　　　　　G</div>
            <div class="lyric-line">今人不见古时月　今月曾经照古人</div>
            <div class="degree-line">Ⅵm　　　　　Ⅲm　　　　　Ⅳ　　　　　　Ⅰ</div>
          </div>
        </div>

      </section>
    </main>

    <!-- 分页与模式控制区 -->
    <section class="page-controls">
      <div class="page-nav">
        <button type="button" class="page-btn">上一页</button>
        <span class="page-indicator">第 1 页 / 共 3 页</span>
        <button type="button" class="page-btn">下一页</button>
      </div>

      <div class="view-modes">
        <button type="button" class="mode-btn">一页显示</button>
        <button type="button" class="mode-btn active">极限一页显示</button>
      </div>
    </section>

    <!-- 底部状态区 -->
    <footer class="status-bar">
      <span class="mode-status">当前模式：极限一页显示</span>
      <span class="degree-status">级数：关</span>
    </footer>

  </div>

</body>
</html>
