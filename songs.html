<!DOCTYPE html><html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老拜有谱 2.0（原型）</title>
<style>
body{margin:0;font-family:system-ui;background:#000;color:#eee}
.header{padding:16px;font-size:22px;font-weight:bold}
.search{padding:10px;width:70%;margin:10px;border-radius:8px;border:none}
.btn{padding:10px 12px;margin:6px;border-radius:8px;border:none;background:#222;color:#eee}
.section{padding:12px}
.song{padding:8px 0;border-bottom:1px solid #222;cursor:pointer}
.viewer{display:none;padding:16px}
.controls{position:fixed;bottom:0;width:100%;background:#111;padding:10px;text-align:center}
.page{min-height:60vh;padding:20px}
</style>
</head>
<body><div id="home">
<div class="header">老拜有谱 2.0</div>
<input class="search" placeholder="搜索歌曲..." oninput="searchSong(this.value)">
<button class="btn" onclick="alert('添加歌曲（下一步实现）')">+ 添加歌曲</button><div class="section" id="songList"></div><div class="section">
<h3>吉他工具</h3>
<button class="btn" onclick="alert('指板音名（下一步实现）')">指板音名</button>
<button class="btn" onclick="alert('吉他定音（下一步实现）')">吉他定音</button>
<button class="btn" onclick="alert('和弦表（下一步实现）')">常用和弦</button>
</div>
</div><div id="viewer" class="viewer">
<div>
<button class="btn" onclick="goHome()">返回</button>
<span id="title"></span>
<span id="pageInfo"></span>
<span id="keyInfo"></span>
</div><pre class="page" id="content"></pre><div class="controls">
<button onclick="prevPage()">上一页</button>
<button onclick="nextPage()">下一页</button>
<br>
<select onchange="changeKey(this.value)">
<option value="0">C</option>
<option value="1">C#</option>
<option value="2">D</option>
<option value="3">D#</option>
<option value="4">E</option>
<option value="5">F</option>
<option value="6">F#</option>
<option value="7">G</option>
<option value="8">G#</option>
<option value="9">A</option>
<option value="10">A#</option>
<option value="11">B</option>
</select>
<button onclick="alert('级数后面加')">级数</button>
<button onclick="alert('一页模式后面加')">一页</button>
<button onclick="alert('极限一页后面加')">极限</button>
</div>
</div><script>
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const songs=[
{
  title:"成都",
  originalKey:"D",
  currentKey:"D",
  pages:[
`[D]让我掉下眼泪的
[Em]不止昨夜的酒
[G]余路还要走多久
[A]你攥着我的手`,
`[D]让我感到为难的
[Em]是挣扎的自由
[G]分别总是在九月
[A]回忆是思念的愁`
]
},
{
  title:"当你老了",
  originalKey:"C",
  currentKey:"C",
  pages:[
`[C]当你老了 头发白了
[F]睡意昏沉
[C]炉火旁打盹
[G]回忆青春`,
`[C]多少人曾爱你青春欢畅的时辰
[F]爱慕你的美丽
[C]假意或真心
[G]只有一个人还爱你虔诚的灵魂`
]
}
];

let currentSong=null;
let pageIndex=0;

function renderList(list=songs){
let html="";
list.forEach((s,i)=>{
html+=`<div class='song' onclick='openSong(${i})'>${s.title}</div>`
});
document.getElementById('songList').innerHTML=html;
}

function searchSong(q){
q=q.toLowerCase();
let filtered=songs.filter(s=>s.title.includes(q));
renderList(filtered);
}

function openSong(i){
  currentSong=songs[i];
  if(!currentSong.currentKey) currentSong.currentKey = currentSong.originalKey;
  pageIndex=0;
  document.getElementById('home').style.display='none';
  document.getElementById('viewer').style.display='block';
  renderSong();
}

function renderSong(){
  document.getElementById('title').innerText=currentSong.title;
  document.getElementById('pageInfo').innerText=` 第${pageIndex+1}/${currentSong.pages.length}页`;
  document.getElementById('keyInfo').innerText=` 当前调：${currentSong.currentKey}`;
  const shift = noteIndex(currentSong.currentKey) - noteIndex(currentSong.originalKey);
  const txt = transposeText(currentSong.pages[pageIndex], shift);
  document.getElementById('content').innerText = txt;
  updateKeySelect();
}

function nextPage(){
if(pageIndex<currentSong.pages.length-1){pageIndex++;renderSong();}
}

function prevPage(){
if(pageIndex>0){pageIndex--;renderSong();}
}

function noteIndex(note){
  return NOTES.indexOf(note);
}

function transposeChord(chord, shift){
  const m = chord.match(/^([A-G])(#?)(.*)$/);
  if(!m) return chord;
  const base = m[1] + (m[2] || '');
  const rest = m[3] || '';
  const idx = noteIndex(base);
  if(idx === -1) return chord;
  let out = NOTES[(idx + shift + 12) % 12] + rest;
  out = out.replace(/\/([A-G])(#?)/g, (all, n, sharp) => {
    const bass = n + (sharp || '');
    const bidx = noteIndex(bass);
    if(bidx === -1) return all;
    return '/' + NOTES[(bidx + shift + 12) % 12];
  });
  return out;
}

function transposeText(text, shift){
  return text.replace(/([^]+)\]/g, (_, chord) => '[' + transposeChord(chord, shift) + ']');
}

function updateKeySelect(){
  const sel = document.querySelector('select');
  if(!sel || !currentSong) return;
  sel.value = String(noteIndex(currentSong.currentKey));
}

function changeKey(val){
  if(!currentSong) return;
  currentSong.currentKey = NOTES[Number(val)];
  renderSong();
}

function goHome(){
document.getElementById('viewer').style.display='none';
document.getElementById('home').style.display='block';
}

// 触摸滑动翻页
let startX = 0;
let endX = 0;

document.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {
  endX = e.changedTouches[0].clientX;
  if(Math.abs(startX - endX) > 50){
    if(startX > endX){
      nextPage(); // 左滑
    } else {
      prevPage(); // 右滑
    }
  }
});

renderList();
</script></body>
</html>
