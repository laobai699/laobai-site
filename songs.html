<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老拜有谱 - 个人曲谱库</title>
    <style>
        :root { 
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-sub: #ddd5cc;
            --text-dim: #99938d;
            --hover-bg: #1a1816;
        }
        html[data-theme="light"] {
            --page-bg: #f0ebe3;
            --module-bg: #faf6f0;
            --content-bg: #faf6f0;
            --border-color: #ddd5c8;
            --text-main: #2a2218;
            --text-sub: #4a4238;
            --text-dim: #7a7268;
            --accent-color: #b86e3f;
            --hover-bg: #e8e0d8;
        }

        body { 
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .navbar { 
            background: var(--module-bg); color: var(--text-main); 
            padding: 0 24px; height: 72px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-home, .dropbtn { 
            text-decoration: none; color: var(--text-main);
            font-size: 14px; font-weight: 500;
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 25px;
            display: flex; align-items: center;
            background: transparent; cursor: pointer;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .btn-home:hover, .dropbtn:hover { background: var(--hover-bg); border-color: #44403c; }

        .nav-title { 
            font-size: 26px; font-weight: 600; letter-spacing: 4px; 
            text-align: center;
        }

        .dropdown { position: relative; display: inline-block; }

        .dropdown-content {
            display: none; position: absolute; right: 0; top: 125%;
            background: var(--content-bg); min-width: 180px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border-radius: 12px; border: 1px solid var(--border-color);
        }
        .dropdown-content.show { display: block; }
        .dropdown-content a { color: var(--text-sub); padding: 14px 20px; text-decoration: none; display: block; font-size: 15px; }
        .dropdown-content a:hover { background: var(--hover-bg); color: var(--text-main); }

        .search-container { padding: 35px 20px 20px 20px; max-width: 550px; margin: 0 auto; }
        #searchInput {
            width: 100%; padding: 14px 22px; border-radius: 12px;
            border: 1px solid var(--border-color); background: var(--content-bg);
            font-size: 15px; color: var(--text-main); outline: none;
            box-sizing: border-box;
        }
        #searchInput::placeholder { color: var(--text-dim); } 

        .song-list { max-width: 550px; margin: 0 auto; padding: 0 20px 80px 20px; }
        .song-item {
            background: var(--content-bg); margin-bottom: 10px; padding: 16px 24px;
            border-radius: 14px; display: flex; justify-content: space-between;
            align-items: center; transition: all 0.3s;
            text-decoration: none; color: inherit; border: 1px solid var(--border-color);
        }
        .song-item:hover { transform: translateY(-2px); background: var(--hover-bg); border-color: #44403c; }
        .song-name { font-weight: 500; font-size: 17px; }
        .song-artist { color: var(--text-sub); font-size: 13px; opacity: 0.9; }

        .growing-item {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--content-bg);
            border-top: 1px solid var(--border-color);
            color: var(--text-dim);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 16px 24px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="btn-home">返回首页</a>
        <div class="nav-title">老拜有谱</div>
        <div class="dropdown">
            <button class="dropbtn" id="dropbtn">实用工具</button>
            <div class="dropdown-content" id="dropdownMenu">
                <a href="tuner.html">🎸 吉他定音器</a>
                <a href="fingerboard.html">🎵 指板音名图</a>
                <a href="chords.html">📖 和弦级数对照表</a>
                <a href="留言板.html">💬 留言板</a>
            </div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="filterSongs()" placeholder="搜索歌名、歌手...">
    </div>

    <div class="song-list" id="songList">
        <a href="songs/把酒问月.html" class="song-item">
            <span class="song-name">把酒问月</span><span class="song-artist">赵照</span>
        </a>
        <a href="songs/米店.html" class="song-item">
            <span class="song-name">米店</span><span class="song-artist">张玮玮</span>
        </a>
        <a href="songs/那些花儿.html" class="song-item">
            <span class="song-name">那些花儿</span><span class="song-artist">朴树</span>
        </a>
        <a href="songs/成都.html" class="song-item">
            <span class="song-name">成都</span><span class="song-artist">赵雷</span>
        </a>
        <a href="songs/儿时.html" class="song-item">
            <span class="song-name">儿时</span><span class="song-artist">刘昊霖</span>
        </a>
        <a href="songs/无尽光芒.html" class="song-item">
            <span class="song-name">无尽光芒</span><span class="song-artist">许巍</span>
        </a>
        <a href="songs/寻水的鱼.html" class="song-item">
            <span class="song-name">寻水的鱼</span><span class="song-artist">许飞</span>
        </a>
        <a href="songs/温暖.html" class="song-item">
            <span class="song-name">温暖</span><span class="song-artist">许巍</span>
        </a>
        <a href="songs/亲密爱人.html" class="song-item">
            <span class="song-name">亲密爱人</span><span class="song-artist">梅艳芳</span>
        </a>
        <a href="songs/借我.html" class="song-item">
            <span class="song-name">借我</span><span class="song-artist">谢春花</span>
        </a>
        <a href="songs/回家吃饭.html" class="song-item">
            <span class="song-name">回家吃饭</span><span class="song-artist">赵照</span>
        </a>
        <a href="songs/当你老了.html" class="song-item">
            <span class="song-name">当你老了</span><span class="song-artist">赵照</span>
        </a>
        <a href="songs/南方姑娘.html" class="song-item">
            <span class="song-name">南方姑娘</span><span class="song-artist">赵雷</span>
        </a>
    </div>

    <div class="growing-item">
        🌱 🌱 🌱 正在慢慢生长 ... 🌱 🌱 🌱
    </div>

    <script>
        const dropbtn = document.getElementById('dropbtn');
        const dropdownMenu = document.getElementById('dropdownMenu');

        dropbtn.onclick = function(event) {
            dropdownMenu.classList.toggle('show');
            event.stopPropagation();
        };

        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn') && !event.target.closest('.dropbtn')) {
                dropdownMenu.classList.remove('show');
            }
        };

        function filterSongs() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let items = document.getElementsByClassName('song-item');
            for (let i = 0; i < items.length - 1; i++) {
                let text = items[i].innerText.toLowerCase();
                items[i].style.display = text.includes(input) ? "" : "none";
            }
        }
    </script>
<script>
function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-toggle').textContent = isDark ? '深色' : '浅色';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
(function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = '深色';
        });
    }
})();
</script>
</body>
</html>
