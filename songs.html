<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老拜有谱</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#111;
      --panel2:#181818;
      --text:#f5efe2;
      --muted:#b7b0a1;
      --accent:#e4b85e;
      --border:#2a2a2a;
      --blue:#9dc1ff;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif
    }
    .app{
      display:grid;
      grid-template-columns:280px 1fr;
      min-height:100vh
    }
    .sidebar{
      background:var(--panel);
      border-right:1px solid var(--border);
      padding:16px;
      position:sticky;
      top:0;
      height:100vh;
      overflow:auto
    }
    .title{font-size:24px;font-weight:700}
    .sub{color:var(--muted);font-size:13px;margin:6px 0 14px}
    .search{
      width:100%;
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      margin-bottom:12px
    }
    .controls{display:grid;gap:10px;margin-bottom:12px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      cursor:pointer
    }
    button.active{
      background:#2b2213;
      border-color:#8f6b2d;
      color:var(--accent)
    }
    .small{font-size:12px;color:var(--muted)}
    .songs{display:grid;gap:8px;margin-top:8px}
    .song-item{
      padding:12px;
      border-radius:14px;
      background:#0d0d0d;
      border:1px solid var(--border);
      cursor:pointer
    }
    .song-item.active{
      border-color:#8f6b2d;
      background:#1e1710
    }
    .song-item .name{font-size:16px;font-weight:700}
    .song-item .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .main{
      padding:18px;
      overflow:hidden
    }
    .viewer{
      background:#000;
      border:1px solid var(--border);
      border-radius:24px;
      height:calc(100vh - 110px);
      overflow:auto;
      padding:18px 18px 110px;
      scroll-behavior:smooth
    }
    .song-header{
      position:sticky;
      top:0;
      z-index:2;
      background:rgba(0,0,0,.82);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px 14px;
      margin-bottom:14px
    }
    .song-header h1{margin:0;font-size:30px}
    .artist{color:var(--muted);margin-top:4px;font-size:15px}
    .meta-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{
      display:inline-flex;
      align-items:center;
      padding:5px 9px;
      border-radius:999px;
      background:rgba(228,184,94,.12);
      color:var(--accent);
      border:1px solid rgba(228,184,94,.22);
      font-size:12px
    }
    .practice-note{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.6
    }
    .section{margin-bottom:18px}
    .section-title{
      display:inline-block;
      font-size:13px;
      color:var(--accent);
      border:1px solid rgba(228,184,94,.22);
      background:rgba(228,184,94,.10);
      border-radius:999px;
      padding:5px 10px;
      margin-bottom:10px
    }
    .line{
      margin-bottom:10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06)
    }
    .chord-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:4px
    }
    .chord,.degree{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre-wrap;
      font-weight:700
    }
    .chord{color:var(--accent)}
    .degree{color:var(--blue)}
    .lyric{
      white-space:pre-wrap;
      font-weight:600;
      line-height:1.75
    }

    .viewer.one-page{
      padding:10px 10px 70px
    }
    .viewer.one-page .song-header{
      padding:10px 12px;
      margin-bottom:8px
    }
    .viewer.one-page .song-header h1{font-size:22px}
    .viewer.one-page .artist{font-size:12px}
    .viewer.one-page .pill{font-size:11px;padding:4px 7px}
    .viewer.one-page .section{margin-bottom:8px}
    .viewer.one-page .section-title{
      font-size:11px;
      margin-bottom:4px;
      padding:3px 8px
    }
    .viewer.one-page .line{
      margin-bottom:4px;
      padding:6px 8px
    }
    .viewer.one-page .lyric{line-height:1.28}

    .viewer.extreme-page{
      padding:6px 6px 56px
    }
    .viewer.extreme-page .song-header{
      padding:6px 8px;
      margin-bottom:4px;
      border-radius:10px
    }
    .viewer.extreme-page .song-header h1{font-size:18px}
    .viewer.extreme-page .artist{
      font-size:10px;
      margin-top:1px
    }
    .viewer.extreme-page .meta-line{
      gap:4px;
      margin-top:4px
    }
    .viewer.extreme-page .pill{
      font-size:10px;
      padding:2px 6px
    }
    .viewer.extreme-page .practice-note{
      font-size:10px;
      line-height:1.2
    }
    .viewer.extreme-page .section{margin-bottom:4px}
    .viewer.extreme-page .section-title{
      font-size:10px;
      margin-bottom:2px;
      padding:2px 6px
    }
    .viewer.extreme-page .line{
      margin-bottom:2px;
      padding:4px 6px;
      border-radius:8px
    }
    .viewer.extreme-page .lyric{line-height:1.12}

    .viewer.compact-dual .line{
      margin-bottom:8px;
      padding:8px 10px
    }
    .viewer.compact-dual .chord-row{
      gap:8px;
      margin-bottom:3px
    }
    .viewer.compact-dual .lyric{line-height:1.5}

    .bottom-bar{
      position:sticky;
      bottom:0;
      z-index:4;
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
      padding:10px 0 0;
      background:linear-gradient(transparent, rgba(5,5,5,.96) 32%)
    }
    .bottom-bar button{
      background:#1a1a1a;
      padding:10px 12px;
      font-size:13px
    }

    .stage .sidebar{display:none}
    .stage .app{grid-template-columns:1fr}
    .stage .main{padding:8px}
    .stage .viewer{height:calc(100vh - 70px)}

    @media (max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:relative;
        height:auto;
        border-right:none;
        border-bottom:1px solid var(--border)
      }
      .main{padding:10px}
      .viewer{
        height:auto;
        min-height:58vh;
        border-radius:18px
      }
      .song-header h1{font-size:26px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="title">老拜弹唱歌库</div>
      <div class="sub">老拜有谱 · 稳定版 V1</div>
      <input id="search" class="search" placeholder="搜索歌名 / 歌手" />

      <div class="controls">
        <div class="row">
          <button id="modeBtn">演出模式</button>
          <button id="fullscreenBtn">全屏</button>
        </div>
        <div class="row">
          <button id="topBtn">回到顶部</button>
          <button id="fitBtn">适中字大</button>
        </div>
        <div class="row">
          <button id="scrollBtn">开始滚屏</button>
          <button id="stageBtn">舞台模式</button>
        </div>
        <div>
          <div class="small">歌词字号</div>
          <input id="fontSlider" type="range" min="28" max="72" value="44" style="width:100%">
        </div>
        <div>
          <div class="small">滚屏速度</div>
          <input id="speedSlider" type="range" min="1" max="12" value="4" style="width:100%">
        </div>
      </div>

      <div class="small">快捷键：空格滚屏，左右切歌，F 全屏，P 一页，X 极限一页，- / = 变调，D 级数，C 紧凑双显，S 舞台模式</div>
      <div id="songList" class="songs"></div>
    </aside>

    <main class="main">
      <div id="viewer" class="viewer"></div>

      <div class="bottom-bar">
        <button id="onePageBtn">一页显示</button>
        <button id="extremePageBtn">极限一页</button>
        <button id="compactBtn">紧凑双显</button>
        <button id="degreeBtnBottom">和弦级数</button>
        <button id="prevBtn">上一首</button>
        <button id="nextBtn">下一首</button>
        <button id="transposeDownBtnBottom">降半音</button>
        <button id="transposeUpBtnBottom">升半音</button>
        <button id="transposeResetBtnBottom">恢复原调</button>
      </div>
    </main>
  </div>

          { name: "副歌 B", lines: [

            { chord: "Dm       G", lyric: "回家成为妈妈遥远的呼唤" },
            { chord: "Cadd9", lyric: "这一声呼唤" },
            { chord: "Am", lyric: "妈妈的笑脸" },
            { chord: "F        G", lyric: "家里才有最初最真的温暖" },
            { chord: "Cadd9", lyric: "回家吃饭" }
          ]},
          { name: "尾声", lines: [
            { chord: "Cadd9    Am       F        G", lyric: "" },
            { chord: "Cadd9", lyric: "" }

    let currentSongId = 1;
    let isPracticeMode = false;
    let onePageMode = false;
    let extremePageMode = false;
    let transpose = 0;
    let degreeMode = 'off';
    let compactDual = false;
    let scrolling = false;
    let scrollTimer = null;
    let fontSize = 44;
    let scrollSpeed = 4;
    let stageMode = false;

    const $ = id => document.getElementById(id);

    const viewer = $('viewer');
    const songList = $('songList');
    const search = $('search');
    const modeBtn = $('modeBtn');
    const fullscreenBtn = $('fullscreenBtn');
    const onePageBtn = $('onePageBtn');
    const extremePageBtn = $('extremePageBtn');
    const topBtn = $('topBtn');
    const fitBtn = $('fitBtn');
    const scrollBtn = $('scrollBtn');
    const compactBtn = $('compactBtn');
    const fontSlider = $('fontSlider');
    const speedSlider = $('speedSlider');
    const degreeBtnBottom = $('degreeBtnBottom');
    const prevBtn = $('prevBtn');
    const nextBtn = $('nextBtn');
    const transposeDownBtnBottom = $('transposeDownBtnBottom');
    const transposeUpBtnBottom = $('transposeUpBtnBottom');
    const transposeResetBtnBottom = $('transposeResetBtnBottom');
    const stageBtn = $('stageBtn');

    function getFilteredSongs(){
      const q = search.value.trim().toLowerCase();
      return !q ? songs : songs.filter(s => (s.title + ' ' + s.artist).toLowerCase().includes(q));
    }

    function syncButtons(){
      modeBtn.classList.toggle('active', isPracticeMode);
      modeBtn.textContent = isPracticeMode ? '练习模式' : '演出模式';

      onePageBtn.classList.toggle('active', onePageMode);
      onePageBtn.textContent = onePageMode ? '退出一页' : '一页显示';

      extremePageBtn.classList.toggle('active', extremePageMode);
      extremePageBtn.textContent = extremePageMode ? '退出极限' : '极限一页';

      compactBtn.classList.toggle('active', compactDual);

      scrollBtn.textContent = scrolling ? '暂停滚屏' : '开始滚屏';

      degreeBtnBottom.classList.toggle('active', degreeMode !== 'off');
      degreeBtnBottom.textContent = degreeMode === 'off' ? '和弦级数' : degreeMode === 'only' ? '只看级数' : '双显示';

      stageBtn.classList.toggle('active', stageMode);
    }

    function renderSongList(){
      const filtered = getFilteredSongs();
      songList.innerHTML = filtered.map(song => `
        <div class="song-item ${song.id === currentSongId ? 'active' : ''}" data-id="${song.id}">
          <div class="name">${song.title}</div>
          <div class="meta">${song.artist} · Key ${song.key}</div>
        </div>
      `).join('');

      document.querySelectorAll('.song-item').forEach(el => {
        el.addEventListener('click', () => {
          currentSongId = Number(el.dataset.id);
          stopScroll();
          renderSongList();
          renderSong();
          document.querySelector('.main')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function transposeChordToken(token, steps){
      const map = {Db:'C#', Eb:'D#', Gb:'F#', Ab:'G#', Bb:'A#'};
      const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const m = token.match(/^([A-G](?:#|b)?)(.*)$/);
      if(!m) return token;
      let root = m[1], suffix = m[2] || '';
      root = map[root] || root;
      const idx = notes.indexOf(root);
      if(idx === -1) return token;
      return notes[(idx + steps + 120) % 12] + suffix;
    }

    function transposeChordLine(line, steps){
      if(!steps) return line;
      return line.replace(/\b([A-G](?:#|b)?(?:m|maj7|maj|min7|min|sus2|sus4|dim|aug|add9|6|7|9|11|13)?(?:\/[A-G](?:#|b)?)?)\b/g, m => {
        return m.includes('/') ? m.split('/').map(x => transposeChordToken(x, steps)).join('/') : transposeChordToken(m, steps);
      });
    }

    function transposeKey(key, steps){
      return (!key || key === '空') ? key : transposeChordToken(key, steps);
    }

    function transposeLabel(steps){
      return steps === 0 ? '原调' : steps > 0 ? `升 ${steps}` : `降 ${Math.abs(steps)}`;
    }

    function chordToDegreeToken(token, key){
      const map = {Db:'C#', Eb:'D#', Gb:'F#', Ab:'G#', Bb:'A#'};
      const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const degrees = ['1','b2','2','b3','3','4','#4','5','b6','6','b7','7'];
      const m = token.match(/^([A-G](?:#|b)?)(.*)$/);
      if(!m) return token;
      let root = m[1], suffix = m[2] || '';
      root = map[root] || root;
      key = map[key] || key;
      const r = notes.indexOf(root), k = notes.indexOf(key);
      if(r === -1 || k === -1) return token;
      return degrees[(r - k + 12) % 12] + suffix;
    }

    function chordLineToDegrees(line, key){
      return line.replace(/\b([A-G](?:#|b)?(?:m|maj7|maj|min7|min|sus2|sus4|dim|aug|add9|6|7|9|11|13)?(?:\/[A-G](?:#|b)?)?)\b/g, m => {
        return m.includes('/') ? m.split('/').map(x => chordToDegreeToken(x, key)).join('/') : chordToDegreeToken(m, key);
      });
    }

    function renderSong(){
      syncButtons();

      viewer.classList.toggle('one-page', onePageMode || extremePageMode);
      viewer.classList.toggle('extreme-page', extremePageMode);
      viewer.classList.toggle('compact-dual', (compactDual && degreeMode === 'dual') || extremePageMode);

      const song = songs.find(s => s.id === currentSongId) || songs[0];
      const currentKey = transposeKey(song.key, transpose);

      const sections = song.sections.map(section => {
        const linesHtml = section.lines.map(line => {
          const chordText = transposeChordLine(line.chord, transpose);
          const degreeText = chordLineToDegrees(chordText, currentKey);

          const chordFont = extremePageMode
            ? Math.max(10, Math.min((fontSize - 18) * 0.32, 13))
            : onePageMode
              ? Math.max(12, Math.min((fontSize - 14) * 0.38, 16))
              : Math.max(fontSize * 0.48, 20);

          const degreeFont = extremePageMode
            ? Math.max(chordFont - 1, 9)
            : onePageMode
              ? Math.max(chordFont - 1, 11)
              : Math.max(chordFont - 2, 16);

          const lyricFont = extremePageMode
            ? Math.max(12, Math.min(fontSize - 22, 16))
            : onePageMode
              ? Math.max(16, Math.min(fontSize - 16, 24))
              : fontSize;

          let rowHtml = `<div class="chord" style="font-size:${chordFont}px">${chordText}</div>`;

          if(degreeMode === 'only'){
            rowHtml = `<div class="degree" style="font-size:${degreeFont}px">${degreeText}</div>`;
          } else if(degreeMode === 'dual'){
            const cc = compactDual ? Math.max(chordFont - 1, 10) : chordFont;
            const dd = compactDual ? Math.max(degreeFont - 1, 9) : degreeFont;
            rowHtml = `<div class="chord-row"><div class="chord" style="font-size:${cc}px">${chordText}</div><div class="degree" style="font-size:${dd}px">${degreeText}</div></div>`;
          }

          return `
            <div class="line">
              ${rowHtml}
              <div class="lyric" style="font-size:${lyricFont}px">${line.lyric}</div>
            </div>
          `;
        }).join('');

        return `
          <div class="section">
            <div class="section-title">${section.name}</div>
            ${linesHtml}
          </div>
        `;
      }).join('');

      viewer.innerHTML = `
        <div class="song-header">
          <h1>${song.title}</h1>
          <div class="artist">${song.artist}</div>
          <div class="meta-line">
            <span class="pill">Key ${currentKey}</span>
            <span class="pill">${transposeLabel(transpose)}</span>
            <span class="pill">Capo ${song.capo}</span>
            <span class="pill">${song.tempo}</span>
          </div>
          ${isPracticeMode ? `<div class="practice-note">前奏：${transposeChordLine(song.intro, transpose)}<br>分解 / 节奏：${song.pattern}</div>` : ''}
        </div>
        ${sections}
      `;

      viewer.scrollTop = 0;
    }

    function jumpToPreview(){ viewer.scrollTop = 0; }

    function startScroll(){
      stopScroll();
      scrolling = true;
      syncButtons();
      scrollTimer = setInterval(() => viewer.scrollBy(0, scrollSpeed * 0.6), 25);
    }

    function stopScroll(){
      scrolling = false;
      if(scrollTimer) clearInterval(scrollTimer);
      scrollTimer = null;
      syncButtons();
    }

    function toggleScroll(){ scrolling ? stopScroll() : startScroll(); }

    function nextSong(){
      const filtered = getFilteredSongs();
      const index = filtered.findIndex(s => s.id === currentSongId);
      if(index >= 0 && index < filtered.length - 1){
        currentSongId = filtered[index + 1].id;
        stopScroll();
        renderSongList();
        renderSong();
      }
    }

    function prevSong(){
      const filtered = getFilteredSongs();
      const index = filtered.findIndex(s => s.id === currentSongId);
      if(index > 0){
        currentSongId = filtered[index - 1].id;
        stopScroll();
        renderSongList();
        renderSong();
      }
    }

    function toggleMode(){
      isPracticeMode = !isPracticeMode;
      renderSong();
      jumpToPreview();
    }

    function toggleOnePage(){
      onePageMode = !onePageMode;
      if(onePageMode) extremePageMode = false;
      stopScroll();
      if((onePageMode || extremePageMode) && degreeMode === 'dual') compactDual = true;
      renderSong();
      jumpToPreview();
    }

    function toggleExtremePage(){
      extremePageMode = !extremePageMode;
      if(extremePageMode){
        onePageMode = false;
        compactDual = true;
      }
      stopScroll();
      renderSong();
      jumpToPreview();
    }

    function toggleDegreeMode(){
      degreeMode = degreeMode === 'off' ? 'only' : degreeMode === 'only' ? 'dual' : 'off';
      if(degreeMode !== 'dual') compactDual = false;
      renderSong();
      jumpToPreview();
    }

    function toggleCompactDual(){
      if(degreeMode !== 'dual'){
        degreeMode = 'dual';
        compactDual = true;
      } else {
        compactDual = !compactDual;
        if(!compactDual){
          degreeMode = 'off';
        }
      }
      renderSong();
      jumpToPreview();
    }

    function resetTranspose(){
      transpose = 0;
      renderSong();
      jumpToPreview();
    }

    function transposeDown(){
      transpose = Math.max(-6, transpose - 1);
      renderSong();
      jumpToPreview();
    }

    function transposeUp(){
      transpose = Math.min(6, transpose + 1);
      renderSong();
      jumpToPreview();
    }

    function toggleStage(){
      stageMode = !stageMode;
      document.body.classList.toggle('stage', stageMode);
      syncButtons();
    }

    search.addEventListener('input', () => {
      const filtered = getFilteredSongs();
      if(!filtered.some(s => s.id === currentSongId) && filtered.length){
        currentSongId = filtered[0].id;
      }
      renderSongList();
      renderSong();
    });

    modeBtn.addEventListener('click', toggleMode);
    fullscreenBtn.addEventListener('click', async () => {
      try{
        if(!document.fullscreenElement) await viewer.requestFullscreen();
        else await document.exitFullscreen();
      }catch(e){}
    });
    onePageBtn.addEventListener('click', toggleOnePage);
    extremePageBtn.addEventListener('click', toggleExtremePage);
    topBtn.addEventListener('click', () => { viewer.scrollTop = 0; });
    fitBtn.addEventListener('click', () => {
      fontSize = extremePageMode ? 24 : onePageMode ? 32 : 44;
      fontSlider.value = fontSize;
      renderSong();
      jumpToPreview();
    });
    scrollBtn.addEventListener('click', toggleScroll);
    compactBtn.addEventListener('click', toggleCompactDual);
    stageBtn.addEventListener('click', toggleStage);

    fontSlider.addEventListener('input', () => {
      fontSize = Number(fontSlider.value);
      renderSong();
      jumpToPreview();
    });

    speedSlider.addEventListener('input', () => {
      scrollSpeed = Number(speedSlider.value);
      if(scrolling) startScroll();
    });

    degreeBtnBottom.addEventListener('click', toggleDegreeMode);
    prevBtn.addEventListener('click', prevSong);
    nextBtn.addEventListener('click', nextSong);
    transposeDownBtnBottom.addEventListener('click', transposeDown);
    transposeUpBtnBottom.addEventListener('click', transposeUp);
    transposeResetBtnBottom.addEventListener('click', resetTranspose);

    window.addEventListener('keydown', e => {
      const tag = document.activeElement && document.activeElement.tagName.toLowerCase();
      if(tag === 'input') return;

      if(e.code === 'Space'){ e.preventDefault(); toggleScroll(); }
      if(e.key === 'ArrowRight') nextSong();
      if(e.key === 'ArrowLeft') prevSong();
      if(e.key === 'ArrowDown'){ e.preventDefault(); viewer.scrollBy(0, 140); }
      if(e.key === 'ArrowUp'){ e.preventDefault(); viewer.scrollBy(0, -140); }
      if(e.key === 'f' || e.key === 'F') fullscreenBtn.click();
      if(e.key === 'p' || e.key === 'P') toggleOnePage();
      if(e.key === 'x' || e.key === 'X') toggleExtremePage();
      if(e.key === '['){
        fontSize = Math.max(28, fontSize - 2);
        fontSlider.value = fontSize;
        renderSong();
        jumpToPreview();
      }
      if(e.key === ']'){
        fontSize = Math.min(72, fontSize + 2);
        fontSlider.value = fontSize;
        renderSong();
        jumpToPreview();
      }
      if(e.key === '-') transposeDown();
      if(e.key === '=') transposeUp();
      if(e.key === '0') resetTranspose();
      if(e.key === 'd' || e.key === 'D') toggleDegreeMode();
      if(e.key === 'c' || e.key === 'C') toggleCompactDual();
      if(e.key === 's' || e.key === 'S') toggleStage();
    });

    renderSongList();
    renderSong();
  </script>
