<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和弦级数对照表 - 老拜有谱</title>
    <style>
        :root {
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-dim: #99938d;
            --hover-bg: #1a1816;
        }
        html[data-theme="light"] {
            --page-bg: #f0ebe3;
            --module-bg: #faf6f0;
            --content-bg: #faf6f0;
            --border-color: #ddd5c8;
            --text-main: #2a2218;
            --text-sub: #4a4238;
            --text-dim: #7a7268;
            --accent-color: #b86e3f;
            --hover-bg: #e8e0d8;
        }
        body {
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        .navbar {
            background: var(--module-bg); padding: 0 16px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-nav {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 6px 14px; border-radius: 25px; font-size: 14px; font-weight: 500;
            cursor: pointer; text-decoration: none;
        }
        .nav-title { font-weight: 600; font-size: 22px; letter-spacing: 2px; flex: 1; text-align: center; }

        .main { padding: 20px 16px 60px; }
        .tip { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 16px; }

        .img-wrap {
            display: flex; justify-content: center;
            overflow: auto;
        }
        .img-wrap img {
            max-width: 100%;
            border-radius: 12px;
            touch-action: pinch-zoom;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="songs.html" class="btn-nav">返回曲谱</a>
        <div class="nav-title">和弦级数对照表</div>
        <button class="btn-nav" id="theme-toggle" onclick="toggleTheme()">浅色</button>
    </div>

    <div class="main">
        <div class="tip">双指捏合可放大查看细节</div>
        <div class="img-wrap">
            <img src="tools/chords.jpg" alt="和弦级数对照表">
        </div>
    </div>
<script>
    function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-toggle').textContent = isDark ? '深色' : '浅色';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.addEventListener('DOMContentLoaded', function() {
                const btn = document.getElementById('theme-toggle');
                if (btn) btn.textContent = '深色';
            });
        }
    })();
</script>
</body>
</html>
