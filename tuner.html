<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉他定音器 - 老拜有谱</title>
    <style>
        :root {
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-sub: #ddd5cc;
            --text-dim: #99938d;
            --accent-color: #c87e4f;
            --hover-bg: #1a1816;
        }
        body {
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        .navbar {
            background: var(--module-bg); padding: 0 16px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-nav {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 6px 14px; border-radius: 25px; font-size: 14px; font-weight: 500;
            cursor: pointer; text-decoration: none;
        }
        .nav-title { font-weight: 600; font-size: 22px; letter-spacing: 2px; flex: 1; text-align: center; }

        .main { max-width: 420px; margin: 0 auto; padding: 30px 20px 60px; }

        /* 标准弦音参考 */
        .strings-ref {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
            margin-bottom: 28px;
        }
        .string-btn {
            background: var(--content-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px 4px; text-align: center;
            cursor: pointer; transition: 0.2s;
        }
        .string-btn:hover { border-color: var(--accent-color); }
        .string-btn.active { border-color: var(--accent-color); background: #1e1510; }
        .string-num { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .string-note { font-size: 20px; font-weight: 600; color: var(--accent-color); }

        /* 主显示区 */
        .display-card {
            background: var(--content-bg); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 32px 20px; text-align: center; margin-bottom: 20px;
        }
        .detected-note {
            font-size: 72px; font-weight: 700; letter-spacing: 2px;
            color: var(--text-main); line-height: 1; margin-bottom: 8px;
            min-height: 80px;
        }
        .detected-freq {
            font-size: 14px; color: var(--text-dim); margin-bottom: 24px;
        }

        /* 音准指示条 */
        .meter-wrap { position: relative; height: 12px; background: #1a1816; border-radius: 6px; margin: 0 10px 16px; }
        .meter-bar {
            position: absolute; top: 0; left: 50%; width: 4px; height: 100%;
            background: var(--accent-color); border-radius: 2px;
            transform: translateX(-50%); transition: left 0.15s;
        }
        .meter-center { position: absolute; top: -4px; left: 50%; width: 2px; height: 20px; background: var(--border-color); transform: translateX(-50%); }
        .meter-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); padding: 0 10px; margin-bottom: 8px; }

        .status-text { font-size: 15px; color: var(--text-dim); min-height: 22px; }
        .status-text.in-tune { color: #6abf7b; }
        .status-text.sharp { color: #e07b5a; }
        .status-text.flat { color: #5a9be0; }

        /* 开始按钮 */
        .btn-start {
            width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 500;
            border: 1px solid var(--border-color); background: var(--content-bg);
            color: var(--text-main); cursor: pointer; transition: 0.3s;
        }
        .btn-start.on { background: var(--accent-color); border-color: var(--accent-color); color: white; }
        .btn-start:hover { opacity: 0.85; }

        .tip { font-size: 13px; color: var(--text-dim); text-align: center; margin-top: 16px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="songs.html" class="btn-nav">返回曲谱</a>
        <div class="nav-title">吉他定音器</div>
        <div style="width: 80px;"></div>
    </div>

    <div class="main">

        <!-- 六弦标准音参考 -->
        <div class="strings-ref">
            <div class="string-btn" onclick="selectString(0)">
                <div class="string-num">6弦</div>
                <div class="string-note">E2</div>
            </div>
            <div class="string-btn" onclick="selectString(1)">
                <div class="string-num">5弦</div>
                <div class="string-note">A2</div>
            </div>
            <div class="string-btn" onclick="selectString(2)">
                <div class="string-num">4弦</div>
                <div class="string-note">D3</div>
            </div>
            <div class="string-btn" onclick="selectString(3)">
                <div class="string-num">3弦</div>
                <div class="string-note">G3</div>
            </div>
            <div class="string-btn" onclick="selectString(4)">
                <div class="string-num">2弦</div>
                <div class="string-note">B3</div>
            </div>
            <div class="string-btn" onclick="selectString(5)">
                <div class="string-num">1弦</div>
                <div class="string-note">E4</div>
            </div>
        </div>

        <!-- 主显示 -->
        <div class="display-card">
            <div class="detected-note" id="noteDisplay">--</div>
            <div class="detected-freq" id="freqDisplay">等待拾音...</div>

            <div class="meter-label">
                <span>偏低 ♭</span>
                <span>准</span>
                <span>偏高 ♯</span>
            </div>
            <div class="meter-wrap">
                <div class="meter-center"></div>
                <div class="meter-bar" id="meterBar"></div>
            </div>

            <div class="status-text" id="statusText">请点击下方开始定音</div>
        </div>

        <button class="btn-start" id="startBtn" onclick="toggleTuner()">开始定音</button>

        <div class="tip">
            拨动琴弦后靠近麦克风<br>
            上方可点击弦号查看目标音高
        </div>
    </div>

<script>
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const STRING_NOTES = ['E2','A2','D3','G3','B3','E4'];
    let audioCtx, analyser, source, rafId;
    let isRunning = false;
    let selectedString = -1;

    function selectString(i) {
        document.querySelectorAll('.string-btn').forEach((b,idx) => b.classList.toggle('active', idx === i));
        selectedString = i;
    }

    function freqToNote(freq) {
        const semitones = 12 * Math.log2(freq / 440);
        const midi = Math.round(semitones) + 69;
        const noteIdx = ((midi % 12) + 12) % 12;
        const octave = Math.floor(midi / 12) - 1;
        const cents = (semitones - Math.round(semitones)) * 100;
        return { name: NOTE_NAMES[noteIdx] + octave, cents };
    }

    function autoCorrelate(buf, sampleRate) {
        const SIZE = buf.length;
        let rms = 0;
        for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
        rms = Math.sqrt(rms / SIZE);
        if (rms < 0.01) return -1;

        let r1 = 0, r2 = SIZE - 1;
        for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break; } }
        for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < 0.2) { r2 = SIZE - i; break; } }
        const buf2 = buf.slice(r1, r2);
        const c = new Array(buf2.length).fill(0);
        for (let i = 0; i < buf2.length; i++)
            for (let j = 0; j < buf2.length - i; j++) c[i] += buf2[j] * buf2[j + i];
        let d = 0;
        while (c[d] > c[d + 1]) d++;
        let maxval = -1, maxpos = -1;
        for (let i = d; i < buf2.length; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
        let T0 = maxpos;
        const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
        const a = (x1 + x3 - 2 * x2) / 2, b2 = (x3 - x1) / 2;
        if (a) T0 = T0 - b2 / (2 * a);
        return sampleRate / T0;
    }

    function update() {
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        const freq = autoCorrelate(buf, audioCtx.sampleRate);

        if (freq > 60 && freq < 1200) {
            const { name, cents } = freqToNote(freq);
            document.getElementById('noteDisplay').textContent = name;
            document.getElementById('freqDisplay').textContent = freq.toFixed(1) + ' Hz';

            const pct = Math.max(0, Math.min(100, 50 + cents * 0.8));
            document.getElementById('meterBar').style.left = pct + '%';

            const st = document.getElementById('statusText');
            if (Math.abs(cents) < 5) {
                st.textContent = '✓ 音准良好'; st.className = 'status-text in-tune';
            } else if (cents > 0) {
                st.textContent = '▲ 偏高 ' + cents.toFixed(0) + ' 音分'; st.className = 'status-text sharp';
            } else {
                st.textContent = '▼ 偏低 ' + Math.abs(cents).toFixed(0) + ' 音分'; st.className = 'status-text flat';
            }
        } else {
            document.getElementById('noteDisplay').textContent = '--';
            document.getElementById('freqDisplay').textContent = '拨弦中...';
            document.getElementById('statusText').textContent = '';
            document.getElementById('statusText').className = 'status-text';
            document.getElementById('meterBar').style.left = '50%';
        }
        rafId = requestAnimationFrame(update);
    }

    async function toggleTuner() {
        if (isRunning) {
            cancelAnimationFrame(rafId);
            if (source) source.disconnect();
            if (audioCtx) audioCtx.close();
            isRunning = false;
            document.getElementById('startBtn').textContent = '开始定音';
            document.getElementById('startBtn').classList.remove('on');
            document.getElementById('noteDisplay').textContent = '--';
            document.getElementById('freqDisplay').textContent = '等待拾音...';
            document.getElementById('statusText').textContent = '请点击下方开始定音';
            document.getElementById('statusText').className = 'status-text';
            document.getElementById('meterBar').style.left = '50%';
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                isRunning = true;
                document.getElementById('startBtn').textContent = '停止定音';
                document.getElementById('startBtn').classList.add('on');
                update();
            } catch(e) {
                alert('无法访问麦克风，请检查权限设置');
            }
        }
    }
</script>
</body>
</html>
