<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SPL3Y3DXJE"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>南方姑娘 - 老拜有谱</title>
    <style>
        :root { 
            --page-bg: #111111; --module-bg: #141210; --content-bg: #151311;
            --border-color: #2a2826; --text-main: #f5f1eb; --text-sub: #ddd5cc;
            --text-dim: #99938d; --accent-color: #c87e4f; --hover-bg: #1a1816;
            --lyric-size: 17px;
            --chord-size: 13px;
        }
        body { font-family: "Helvetica Neue","PingFang SC","Microsoft YaHei",Arial,sans-serif; background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .navbar { background: var(--module-bg) !important; padding: 0 16px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1002; border-bottom: 1px solid var(--border-color); }
        .btn-nav { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 14px; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; }
        .nav-title { font-weight: 600; font-size: 22px; letter-spacing: 2px; flex: 1; text-align: center; }
        .controls-wrapper { background: var(--module-bg) !important; border-bottom: 1px solid var(--border-color); display: flex; overflow-x: auto; white-space: nowrap; padding: 8px 12px; gap: 10px; position: sticky; top: 64px; z-index: 1001; -webkit-overflow-scrolling: touch; box-sizing: border-box; width: 100%; align-items: center; }
        .controls-wrapper::-webkit-scrollbar { display: none; }
        select, .btn-tool { flex-shrink: 0; padding: 7px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--content-bg); font-size: 13px; color: var(--text-sub); outline: none; cursor: pointer; }
        .btn-tool.active { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color); }
        .ctrl-divider { flex-shrink: 0; width: 1px; height: 28px; background: var(--border-color); margin: 0 2px; }
        .ctrl-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .ctrl-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
        .ctrl-num { width: 42px; background: var(--content-bg); border: 1px solid var(--border-color); color: var(--accent-color); border-radius: 8px; padding: 5px 4px; font-size: 12px; text-align: center; outline: none; }
        .ctrl-slider { width: 64px; accent-color: var(--accent-color); cursor: pointer; }
        #mainContainer { max-width: 550px; margin: 15px auto; background: var(--content-bg); padding: 24px 20px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.4); position: relative; z-index: 1; }
        .line { display: flex; flex-wrap: wrap; margin-bottom: 20px; line-height: 1.2; }
        .word-group { display: inline-flex; flex-direction: column; align-items: center; min-width: 1.1em; margin-right: 1px; }
        .chord-box { color: var(--accent-color); font-weight: bold; font-size: var(--chord-size); height: 1.5em; font-family: Arial, sans-serif; }
        .lyric-box { font-size: var(--lyric-size); color: var(--text-main); font-weight: 500; letter-spacing: 0.5px; }
        .section-label { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; margin: 8px 0 16px; padding-bottom: 6px; border-bottom: 1px solid var(--border-color); }
        .song-footer-nav { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .footer-btn { text-decoration: none; color: var(--text-sub); font-size: 14px; border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 12px; background: var(--module-bg); display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .footer-btn:hover { background: var(--hover-bg); border-color: #44403c; color: var(--text-main); }
    </style>
</head>
<body id="bodyTag">
    <div class="navbar">
        <button class="btn-nav" onclick="window.location.href='../songs.html'">返回目录</button>
        <div class="nav-title">老拜有谱</div>
        <div style="width: 70px; flex-shrink: 0;"></div>
    </div>

    <div class="controls-wrapper">
        <select id="keySelect" onchange="saveKey(); updateView()">
            <option value="0">C 调</option><option value="1">C#/Db</option><option value="2">D</option>
            <option value="3">D#/Eb</option><option value="4">E</option><option value="5">F 调 ★原调</option>
            <option value="6">F#/Gb</option><option value="7">G</option><option value="8">G#/Ab</option>
            <option value="9">A</option><option value="10">A#/Bb</option><option value="11">B</option>
        </select>
        <button id="degreeBtn" class="btn-tool" onclick="toggleDegree()">级数</button>
        <div class="ctrl-divider"></div>
        <div class="ctrl-group">
            <span class="ctrl-label">字号</span>
            <button class="btn-tool" onclick="changeFontSize(-1)" style="padding:7px 10px;">A-</button>
            <button class="btn-tool" onclick="changeFontSize(1)" style="padding:7px 10px;">A+</button>
        </div>
        <div class="ctrl-divider"></div>
        <div class="ctrl-group">
            <button id="scrollBtn" class="btn-tool" onclick="toggleScroll()">滚动</button>
            <span class="ctrl-label">速度</span>
            <input type="range" id="scrollSpeed" class="ctrl-slider" min="1" max="10" value="3">
        </div>
        <div class="ctrl-divider"></div>
        <div class="ctrl-group">
            <button id="metroBtn" class="btn-tool" onclick="toggleMetronome()">节拍</button>
            <input type="number" id="bpmInput" class="ctrl-num" value="80" min="40" max="240">
            <span class="ctrl-label">BPM</span>
        </div>
    </div>

    <div id="mainContainer">
        <div style="text-align:center;margin-bottom:25px;">
            <div style="font-size:20px;font-weight:500;letter-spacing:1.5px;">南方姑娘</div>
            <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">赵雷 · 民谣精选</div>
        </div>
        <div id="tabContent"></div>
        <div class="song-footer-nav">
            <a href="当你老了.html" class="footer-btn"><span>⇠</span> 当你老了</a>
            <a href="把酒问月.html" class="footer-btn">把酒问月 <span>⇢</span></a>
        </div>
    </div>

<script>
    let wakeLock = null;
    const requestWakeLock = async () => { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} };
    document.addEventListener('visibilitychange', () => { if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock(); });
    requestWakeLock();

    let lyricSize = 17;
    function changeFontSize(delta) {
        lyricSize = Math.min(28, Math.max(12, lyricSize + delta));
        const chordSize = Math.round(lyricSize * 0.76);
        document.documentElement.style.setProperty('--lyric-size', lyricSize + 'px');
        document.documentElement.style.setProperty('--chord-size', chordSize + 'px');
    }

    let scrollJob = null;
    function toggleScroll() {
        const btn = document.getElementById('scrollBtn');
        if (scrollJob) { clearInterval(scrollJob); scrollJob = null; btn.classList.remove('active'); btn.innerText = '滚动'; }
        else { btn.classList.add('active'); btn.innerText = '停止'; scrollJob = setInterval(() => { window.scrollBy(0, parseInt(document.getElementById('scrollSpeed').value) * 0.3 + 0.3); }, 30); }
    }

    let audioCtx = null, isMetroPlaying = false, nextTickTime = 0, metroTimerID = null;
    function playMetroTick() { const osc = audioCtx.createOscillator(), env = audioCtx.createGain(); osc.frequency.value = 1000; env.gain.setValueAtTime(1, audioCtx.currentTime); env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); osc.connect(env); env.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }
    function metroScheduler() { const bpm = Math.max(40, Math.min(240, parseInt(document.getElementById('bpmInput').value) || 80)); while (nextTickTime < audioCtx.currentTime + 0.1) { playMetroTick(); nextTickTime += 60.0 / bpm; } metroTimerID = setTimeout(metroScheduler, 50); }
    function toggleMetronome() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isMetroPlaying = !isMetroPlaying;
        const btn = document.getElementById('metroBtn');
        if (isMetroPlaying) { nextTickTime = audioCtx.currentTime; metroScheduler(); btn.classList.add('active'); btn.innerText = '停止'; }
        else { clearTimeout(metroTimerID); btn.classList.remove('active'); btn.innerText = '节拍'; }
    }

    const baseKey = 'C';
    const rawData = [
        { label: '主歌 A' },
        { content: [["C","北"],["","方"],["","的"],["","村"],["G","庄"],["G "," "],["","住"],["","着"],["","一"],["","个"],[" "," "],["Am","南"],["","方"],["","的"],["","姑"],["Em","娘"]] },
        { content: [["","她"],["F","总"],["","是"],["","喜"],["C","欢"],["","穿"],["","着"],["C","带"],["","花"],["","的"],["","裙"],["","子"],["Dm7","站"],["","在"],["","路"],["G","旁"]] },
        { content: [["C",""],["","她"],["","的"],["","话"],["","不"],["","多"],["G",""],["","但"],["","笑"],["","起"],["","来"],["","是"],["","那"],["","么"],["Am","平"],["","静"],["","悠"],["Em","扬"]] },
        { content: [["","她"],["F","柔"],["","弱"],["","的"],["","眼"],["","神"],["","里"],["C","装"],["","的"],["","是"],["","什"],["","么"],[" "," "],["","是"],["Dm7","思"],["","念"],["G",""],["","的"],["","忧"],["C","伤"]] },
        { content: [["C","南"],["","方"],["","的"],["","小"],["","镇"],["G",""],["","阴"],["","雨"],["","的"],["","冬"],["","天"],["Am","没"],["","有"],["","北"],["","方"],["Em","冷"]] },
        { content: [["","她"],["F","不"],["","需"],["","要"],["","臃"],["","肿"],["","的"],["C","棉"],["","衣"],["","去"],["","遮"],["","盖"],["","她"],["Dm7","似"],["","水"],["","的"],["","面"],["G","容"]] },
        { content: [["C",""],["","她"],["","在"],["","来"],["","去"],["","的"],["","街"],["G",""],["","头"],["","留"],["","下"],["","影"],["","子"],["","芳"],["","香"],["Am","在"],["","会"],["","怦"],["","然"],["","的"],["","心"],["Em","头"]] },
        { content: [["F","眨"],["","眼"],["","的"],["","时"],["","间"],["C","芳"],["","香"],["","已"],["","飘"],["","散"],["Dm7","影"],["","子"],["G",""],["","已"],["","不"],["C","见"]] },
        { content: [["F","南"],["G","方"],["","姑"],["","娘"],["C "," "],["","你"],["F","是"],["","否"],["","习"],["","惯"],["G","北"],["","方"],["","的"],["","秋"],["C","凉"]] },
        { content: [["F","南"],["G","方"],["","姑"],["","娘"],["C "," "],["","你"],["F","是"],["","否"],["","喜"],["","欢"],["","北"],["F",""],["","方"],["","人"],["","的"],["","直"],["G","爽"]] },

        { label: '主歌 B' },
        { content: [["C","日"],["","子"],["","过"],["","的"],["G","就"],["","像"],["","那"],["","些"],["F","不"],["","眠"],["G","的"],["","晚"],["C","上"]] },
        { content: [["C",""],["","她"],["","嚼"],["","着"],["","口"],["Em",""],["","香"],["","糖"],["","对"],["","墙"],["F","满"],["","谈"],["G","着"],["","理"],["C","想"]] },
        { content: [["F","南"],["G","方"],["","姑"],["C","娘"],[" "," "],["F","我"],["","们"],["F","都"],["","在"],["","忍"],["","受"],["G","着"],["","漫"],["C","长"]] },
        { content: [["F","南"],["G","方"],["","姑"],["C","娘"],[" "," "],["","是"],["","不"],["F","是"],["","高"],["","楼"],["","遮"],["","住"],["","了"],["F",""],["","你"],["","的"],["","希"],["G","望"]] },
        { content: [["C","昨"],["","日"],["","的"],["","雨"],["","曾"],["G","淋"],["","漓"],["","过"],["","她"],["Am","瘦"],["","弱"],["","的"],["","肩"],["Em","膀"]] },
        { content: [["F","夜"],["","空"],["","的"],["","北"],["","斗"],["","也"],["C","没"],["","有"],["","让"],["","她"],["","找"],["","到"],["Dm","迷"],["","途"],["","的"],["","方"],["G","向"]] },
        { content: [["C",""],["","阳"],["","光"],["","里"],["","她"],["","在"],["G","院"],["","子"],["","中"],["","央"],["Am","晾"],["","晒"],["","着"],["","衣"],["Em","裳"]] },
        { content: [["","在"],["F","四"],["","季"],["","的"],["","风"],["","中"],["","她"],["C","散"],["","着"],["","头"],["","发"],["Dm","安"],["","慰"],["G","着"],["","时"],["C","光"]] },
        { content: [["F","南"],["G","方"],["","姑"],["C","娘"],[" "," "],["","你"],["F","是"],["","否"],["","爱"],["","上"],["G","了"],["","北"],["C","方"]] },
        { content: [["F","南"],["G","方"],["","姑"],["C","娘"],[" "," "],["","你"],["","说"],["F","今"],["","天"],["","你"],["","就"],["","要"],["F",""],["","回"],["","到"],["","你"],["","的"],["","家"],["G","乡"]] },
        { content: [["C","思"],["","念"],["","让"],["","人"],["G","心"],["","伤"],[" "," "],["","她"],["","呼"],["","唤"],["F","着"],["","你"],["G","的"],["","泪"],["C","光"]] },
        { content: [["C",""],["","南"],["","方"],["","的"],["","果"],["Em","子"],["","已"],["","熟"],["","那"],["","是"],["","你"],["F","简"],["","单"],["G","的"],["","理"],["C","想"],["","哎"],["","嗨"]] },
        { content: [["F","Na"],["G","……"],["C","Na"],["","……"],[" "," "],["F","Na"],["G","……"],["C","Na"],["","……"]] },
        { content: [["F","Na"],["G","……"],["C","Na"],["","……"],[" "," "],["F","Na"],["G","……"],["C","Na"],["","……"]] },
    ];

    const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const degrees = ['1','1#','2','2#','3','4','4#','5','5#','6','6#','7'];
    let isDegreeMode = false;

    function processChord(chord, targetKeyIndex) {
        if (!chord) return "";
        const baseKeyIndex = notes.indexOf(baseKey);
        if (isDegreeMode) {
            return chord.replace(/[A-G]#?/g, (match) => {
                let i = notes.indexOf(match);
                return degrees[(i - baseKeyIndex + 12) % 12];
            });
        } else {
            const offset = (targetKeyIndex - baseKeyIndex + 12) % 12;
            return chord.replace(/[A-G]#?/g, (match) => {
                let i = notes.indexOf(match);
                return notes[(i + offset) % 12];
            });
        }
    }

    function updateView() {
        const target = parseInt(document.getElementById('keySelect').value);
        const container = document.getElementById('tabContent');
        container.innerHTML = '';
        rawData.forEach(item => {
            if (item.label) { const el = document.createElement('div'); el.className = 'section-label'; el.textContent = item.label; container.appendChild(el); return; }
            const lineEl = document.createElement('div'); lineEl.className = 'line';
            item.content.forEach(([chord, lyric]) => {
                const group = document.createElement('div'); group.className = 'word-group';
                group.innerHTML = `<div class="chord-box">${processChord(chord, target)}</div><div class="lyric-box">${lyric}</div>`;
                lineEl.appendChild(group);
            });
            container.appendChild(lineEl);
        });
    }

    function toggleDegree() { isDegreeMode = !isDegreeMode; document.getElementById('degreeBtn').classList.toggle('active'); updateView(); }

    const SONG_KEY = 'key_南方姑娘';
    function saveKey() { localStorage.setItem(SONG_KEY, document.getElementById('keySelect').value); }
    const savedKey = localStorage.getItem(SONG_KEY);
    if (savedKey !== null) document.getElementById('keySelect').value = savedKey;

    updateView();
</script>
</body>
</html>
