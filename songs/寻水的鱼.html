<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SPL3Y3DXJE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SPL3Y3DXJE');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寻水的鱼 - 老拜有谱</title>
    <style>
        :root { 
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-sub: #ddd5cc;
            --text-dim: #99938d;
            --accent-color: #c87e4f;
            --hover-bg: #1a1816;
            --lyric-size: 17px;
            --chord-size: 13px;
        }
        body { 
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        .navbar { 
            background: var(--module-bg) !important; padding: 0 16px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1002;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-nav { 
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 6px 14px; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none;
        }
        .nav-title { font-weight: 600; font-size: 22px; letter-spacing: 2px; flex: 1; text-align: center; }
        .controls-wrapper {
            background: var(--module-bg) !important; border-bottom: 1px solid var(--border-color);
            display: flex; overflow-x: auto; white-space: nowrap;
            padding: 8px 12px; gap: 10px; position: sticky; top: 64px; z-index: 1001;
            -webkit-overflow-scrolling: touch; box-sizing: border-box; width: 100%;
            align-items: center;
        }
        .controls-wrapper::-webkit-scrollbar { display: none; }
        select, .btn-tool { 
            flex-shrink: 0; padding: 7px 12px; border-radius: 10px; border: 1px solid var(--border-color); 
            background: var(--content-bg); font-size: 13px; color: var(--text-sub); outline: none; cursor: pointer;
        }
        .btn-tool.active { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color); }
        .ctrl-divider { flex-shrink: 0; width: 1px; height: 28px; background: var(--border-color); margin: 0 2px; }
        .ctrl-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .ctrl-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
        .ctrl-num { 
            width: 42px; background: var(--content-bg); border: 1px solid var(--border-color); 
            color: var(--accent-color); border-radius: 8px; padding: 5px 4px; 
            font-size: 12px; text-align: center; outline: none;
        }
        .ctrl-slider { width: 64px; accent-color: var(--accent-color); cursor: pointer; }
        #mainContainer { 
            max-width: 550px; margin: 15px auto; background: var(--content-bg); 
            padding: 24px 20px; border-radius: 16px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); position: relative; z-index: 1;
        }
        .line { display: flex; flex-wrap: wrap; margin-bottom: 20px; line-height: 1.2; }
        .word-group { display: inline-flex; flex-direction: column; align-items: center; min-width: 1.1em; margin-right: 1px; }
        .chord-box { color: var(--accent-color); font-weight: bold; font-size: var(--chord-size); height: 1.5em; font-family: Arial, sans-serif; }
        .lyric-box { font-size: var(--lyric-size); color: var(--text-main); font-weight: 500; letter-spacing: 0.5px; }
        .song-footer-nav { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .footer-btn { text-decoration: none; color: var(--text-sub); font-size: 14px; border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 12px; background: var(--module-bg); display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .footer-btn:hover { background: var(--hover-bg); border-color: #44403c; color: var(--text-main); }
    </style>
</head>
<body id="bodyTag">

    <div class="navbar">
        <button class="btn-nav" onclick="window.location.href='../songs.html'">返回目录</button>
        <div class="nav-title">老拜有谱</div>
        <div style="width: 70px; flex-shrink: 0;"></div>
    </div>

    <div class="controls-wrapper">
        <select id="keySelect" onchange="saveKey(); updateView()">
            <option value="0">C 调</option><option value="1">C#/Db</option><option value="2">D</option>
            <option value="3">D#/Eb</option><option value="4">E</option><option value="5">F</option>
            <option value="6">F#/Gb</option><option value="7">G</option><option value="8">G#/Ab</option>
            <option value="9">A</option><option value="10">A#/Bb 调 ★原调</option><option value="11">B</option>
        </select>
        <button id="degreeBtn" class="btn-tool" onclick="toggleDegree()">级数</button>

        <div class="ctrl-divider"></div>

        <div class="ctrl-group">
            <span class="ctrl-label">字号</span>
            <button class="btn-tool" onclick="changeFontSize(-1)" style="padding: 7px 10px;">A-</button>
            <button class="btn-tool" onclick="changeFontSize(1)"  style="padding: 7px 10px;">A+</button>
        </div>

        <div class="ctrl-divider"></div>

        <div class="ctrl-group">
            <button id="scrollBtn" class="btn-tool" onclick="toggleScroll()">滚动</button>
            <span class="ctrl-label">速度</span>
            <input type="range" id="scrollSpeed" class="ctrl-slider" min="1" max="10" value="3">
        </div>

        <div class="ctrl-divider"></div>

        <div class="ctrl-group">
            <button id="metroBtn" class="btn-tool" onclick="toggleMetronome()">节拍</button>
            <input type="number" id="bpmInput" class="ctrl-num" value="80" min="40" max="240">
            <span class="ctrl-label">BPM</span>
        </div>
    </div>

    <div id="mainContainer">
        <div style="text-align: center; margin-bottom: 25px;">
            <div style="font-size: 20px; font-weight: 500; letter-spacing: 1.5px;">寻水的鱼</div>
            <div style="font-size: 12px; color: var(--text-dim); margin-top: 4px;">许飞 · 民谣精选</div>
        </div>

        <div id="tabContent"></div>

        <div class="song-footer-nav">
            <a href="无尽光芒.html" class="footer-btn"><span>⇠</span> 无尽光芒</a>
            <a href="温暖.html" class="footer-btn">温暖 <span>⇢</span></a>
        </div>
    </div>

<script>
    let wakeLock = null;
    const requestWakeLock = async () => {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    };
    document.addEventListener('visibilitychange', () => { if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock(); });
    requestWakeLock();

    let lyricSize = 17;
    function changeFontSize(delta) {
        lyricSize = Math.min(28, Math.max(12, lyricSize + delta));
        const chordSize = Math.round(lyricSize * 0.76);
        document.documentElement.style.setProperty('--lyric-size', lyricSize + 'px');
        document.documentElement.style.setProperty('--chord-size', chordSize + 'px');
    }

    let scrollJob = null;
    function toggleScroll() {
        const btn = document.getElementById('scrollBtn');
        if (scrollJob) {
            clearInterval(scrollJob); scrollJob = null;
            btn.classList.remove('active'); btn.innerText = '滚动';
        } else {
            btn.classList.add('active'); btn.innerText = '停止';
            scrollJob = setInterval(() => {
                const speed = parseInt(document.getElementById('scrollSpeed').value);
                window.scrollBy(0, speed * 0.3 + 0.3);
            }, 30);
        }
    }

    let audioCtx = null, isMetroPlaying = false, nextTickTime = 0, metroTimerID = null;
    function playMetroTick() {
        const osc = audioCtx.createOscillator(), env = audioCtx.createGain();
        osc.frequency.value = 1000;
        env.gain.setValueAtTime(1, audioCtx.currentTime);
        env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(env); env.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }
    function metroScheduler() {
        const bpm = Math.max(40, Math.min(240, parseInt(document.getElementById('bpmInput').value) || 80));
        while (nextTickTime < audioCtx.currentTime + 0.1) { playMetroTick(); nextTickTime += 60.0 / bpm; }
        metroTimerID = setTimeout(metroScheduler, 50);
    }
    function toggleMetronome() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isMetroPlaying = !isMetroPlaying;
        const btn = document.getElementById('metroBtn');
        if (isMetroPlaying) { nextTickTime = audioCtx.currentTime; metroScheduler(); btn.classList.add('active'); btn.innerText = '停止'; }
        else { clearTimeout(metroTimerID); btn.classList.remove('active'); btn.innerText = '节拍'; }
    }

    const baseKey = 'C';
    const rawData = [
        { content: [["C","没"],["","有"],["","道"],["","理"],["","的"],["","爱"],["","你"],[" "," "],["Am","没"],["","有"],["","道"],["","理"],["","的"],["","想"],["","你"]] },
        { content: [["F","这"],["","种"],["","感"],["","觉"],["","到"],["","来"],["","的"],["","不"],["","可"],["G","思"],["","议"]] },
        { content: [["C","没"],["","有"],["","雨"],["","儿"],["","的"],["","风"],["","里"],[" "," "],["Am","没"],["","有"],["","星"],["","星"],["","的"],["","夜"],["","里"]] },
        { content: [["F","你"],["","的"],["","湖"],["","面"],["","平"],["","静"],["","如"],["","洗"],["","有"],["G","些"],["","忧"],["","郁"]] },
        { content: [["","我"],["C","是"],["","一"],["","条"],["","寻"],["","水"],["","的"],["","鱼"],[" "," "],["","我"],["Am","漂"],["","浮"],["","在"],["","这"],["","寂"],["","寞"],["","城"],["","里"]] },
        { content: [["","我"],["F","忘"],["","记"],["","了"],["","自"],["","己"],[" "," "],["","紧"],["","紧"],["","拥"],["","抱"],["","你"],["","给"],["G","我"],["","的"],["","那"],["","片"],["","涟"],["","漪"]] },
        { content: [["","我"],["C","是"],["","一"],["","条"],["","寻"],["","水"],["","的"],["","鱼"],[" "," "],["","我"],["Am","轻"],["","轻"],["","跳"],["","进"],["","你"],["","的"],["","怀"],["","里"]] },
        { content: [["","我"],["F","自"],["","由"],["","的"],["","游"],["","弋"],[" "," "],["","寻"],["","找"],["","着"],["","自"],["","己"],["","渴"],["G","望"],["","的"],["","那"],["","片"],["","天"],["C","地"]] },
    ];

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const degrees = ['1', '1#', '2', '2#', '3', '4', '4#', '5', '5#', '6', '6#', '7'];
    let isDegreeMode = false;

    function processChord(chord, targetKeyIndex) {
        if (!chord) return "";
        const baseKeyIndex = notes.indexOf(baseKey);
        if (isDegreeMode) {
            return chord.replace(/[A-G]#?/g, (match) => {
                let i = notes.indexOf(match);
                return degrees[(i - baseKeyIndex + 12) % 12];
            });
        } else {
            const offset = (targetKeyIndex - baseKeyIndex + 12) % 12;
            return chord.replace(/[A-G]#?/g, (match) => {
                let i = notes.indexOf(match);
                return notes[(i + offset) % 12];
            });
        }
    }

    function updateView() {
        const target = parseInt(document.getElementById('keySelect').value);
        const container = document.getElementById('tabContent');
        container.innerHTML = '';
        rawData.forEach(item => {
            const lineEl = document.createElement('div');
            lineEl.className = 'line';
            item.content.forEach(([chord, lyric]) => {
                const group = document.createElement('div');
                group.className = 'word-group';
                group.innerHTML = `<div class="chord-box">${processChord(chord, target)}</div><div class="lyric-box">${lyric}</div>`;
                lineEl.appendChild(group);
            });
            container.appendChild(lineEl);
        });
    }

    function toggleDegree() { isDegreeMode = !isDegreeMode; document.getElementById('degreeBtn').classList.toggle('active'); updateView(); }

    const SONG_KEY = 'key_寻水的鱼';
    function saveKey() { localStorage.setItem(SONG_KEY, document.getElementById('keySelect').value); }
    const savedKey = localStorage.getItem(SONG_KEY);
    if (savedKey !== null) document.getElementById('keySelect').value = savedKey;

    updateView();
</script>
</body>
</html>
