<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>那些花儿 - 老拜有谱</title>
    <style>
        :root {
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-sub: #ddd5cc;
            --text-dim: #99938d;
            --accent-color: #c87e4f;
            --hover-bg: #1a1816;
            --lyric-size: 17px;
        }
        body { font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .navbar { background: var(--module-bg) !important; padding: 0 16px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1002; border-bottom: 1px solid var(--border-color); }
        .btn-nav { flex-shrink: 0; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 14px; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; }
        .nav-title { font-weight: 600; font-size: 22px; letter-spacing: 2px; flex: 1; text-align: center; }
        .controls-wrapper { background: var(--module-bg) !important; border-bottom: 1px solid var(--border-color); display: flex; overflow-x: auto; white-space: nowrap; padding: 8px 12px; gap: 10px; position: sticky; top: 64px; z-index: 1001; -webkit-overflow-scrolling: touch; box-sizing: border-box; width: 100%; align-items: center; }
        .controls-wrapper::-webkit-scrollbar { display: none; }
        select, .btn-tool { flex-shrink: 0; padding: 7px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--content-bg); font-size: 13px; color: var(--text-sub); cursor: pointer; outline: none; }
        .btn-tool.active { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color); }
        .ctrl-divider { flex-shrink: 0; width: 1px; height: 28px; background: var(--border-color); margin: 0 2px; }
        .ctrl-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .ctrl-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
        .ctrl-num { width: 42px; background: var(--content-bg); border: 1px solid var(--border-color); color: var(--accent-color); border-radius: 8px; padding: 5px 4px; font-size: 12px; text-align: center; outline: none; }
        .ctrl-slider { width: 64px; accent-color: var(--accent-color); cursor: pointer; }
        #mainContainer { max-width: 550px; margin: 15px auto; background: var(--content-bg); padding: 24px 20px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.4); box-sizing: border-box; position: relative; z-index: 1; }
        .song-footer-nav { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .footer-btn { text-decoration: none; color: var(--text-sub); font-size: 14px; border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 12px; background: var(--module-bg); display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .footer-btn:hover { background: var(--hover-bg); border-color: #44403c; color: var(--text-main); }
        .line { display: flex; flex-wrap: wrap; margin-bottom: 20px; line-height: 1.2; }
        .word-group { display: inline-flex; flex-direction: column; align-items: center; min-width: 1.1em; margin-right: 1px; }
        .chord-box { color: var(--accent-color); font-weight: bold; font-size: 13px; height: 1.5em; font-family: Arial, sans-serif; }
        .lyric-box { font-size: var(--lyric-size); color: var(--text-main); font-weight: 500; letter-spacing: 0.5px; }
        .song-title-area { text-align: center; margin-bottom: 25px; }
    </style>
</head>
<body id="bodyTag">

    <div class="navbar">
        <button class="btn-nav" onclick="window.location.href='../songs.html'">返回目录</button>
        <div class="nav-title">老拜有谱</div>
        <div style="width: 70px; flex-shrink: 0;"></div>
    </div>

    <div class="controls-wrapper">
        <!-- 变调（E调原调） -->
        <select id="keySelect" onchange="saveKey(); updateView()">
            <option value="0">E 调 (原)</option>
            <option value="1">F</option>
            <option value="2">F#/Gb</option>
            <option value="3">G</option>
            <option value="4">G#/Ab</option>
            <option value="5">F 调 ★原调</option>
            <option value="6">A#/Bb</option>
            <option value="7">B</option>
            <option value="8">C</option>
            <option value="9">C#/Db</option>
            <option value="10">D</option>
            <option value="11">D#/Eb</option>
        </select>
        <!-- 级数模式 -->
        <button id="degreeBtn" class="btn-tool" onclick="toggleDegree()">级数</button>

        <div class="ctrl-divider"></div>

        <!-- 字体缩放 -->
        <div class="ctrl-group">
            <span class="ctrl-label">字号</span>
            <button class="btn-tool" onclick="changeFontSize(-1)" style="padding: 7px 10px;">A-</button>
            <button class="btn-tool" onclick="changeFontSize(1)"  style="padding: 7px 10px;">A+</button>
        </div>

        <div class="ctrl-divider"></div>

        <!-- 自动滚动 + 速度 -->
        <div class="ctrl-group">
            <button id="scrollBtn" class="btn-tool" onclick="toggleScroll()">滚动</button>
            <span class="ctrl-label">速度</span>
            <input type="range" id="scrollSpeed" class="ctrl-slider" min="1" max="10" value="3">
        </div>

        <div class="ctrl-divider"></div>

        <!-- 节拍器 + BPM -->
        <div class="ctrl-group">
            <button id="metroBtn" class="btn-tool" onclick="toggleMetronome()">节拍</button>
            <input type="number" id="bpmInput" class="ctrl-num" value="80" min="40" max="240">
            <span class="ctrl-label">BPM</span>
        </div>
    </div>

    <div id="mainContainer">
        <div class="song-title-area">
            <div style="font-size: 20px; font-weight: 500; letter-spacing: 1.5px;">那些花儿</div>
            <div style="font-size: 12px; color: var(--text-dim); margin-top: 4px;">朴树 · 民谣经典</div>
        </div>

        <div id="tabContent"></div>

        <div class="song-footer-nav">
            <a href="米店.html" class="footer-btn"><span>⇠</span> 米店</a>
            <a href="成都.html" class="footer-btn">成都 <span>⇢</span></a>
        </div>
    </div>

<script>
    // 屏幕长亮
    let wakeLock = null;
    const requestWakeLock = async () => {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    };
    document.addEventListener('visibilitychange', () => { if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock(); });
    requestWakeLock();

    // 字体缩放
    let lyricSize = 17;
    function changeFontSize(delta) {
        lyricSize = Math.min(28, Math.max(12, lyricSize + delta));
        document.documentElement.style.setProperty('--lyric-size', lyricSize + 'px');
    }

    // 自动滚动
    let scrollJob = null;
    function toggleScroll() {
        const btn = document.getElementById('scrollBtn');
        if (scrollJob) {
            clearInterval(scrollJob); scrollJob = null;
            btn.classList.remove('active'); btn.innerText = '滚动';
        } else {
            btn.classList.add('active'); btn.innerText = '停止';
            scrollJob = setInterval(() => {
                const speed = parseInt(document.getElementById('scrollSpeed').value);
                window.scrollBy(0, speed * 0.4);
            }, 30);
        }
    }

    // 节拍器
    let audioCtx = null;
    let isMetroPlaying = false;
    let nextTickTime = 0;
    let metroTimerID = null;

    function playMetroTick() {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.frequency.value = 1000;
        env.gain.setValueAtTime(1, audioCtx.currentTime);
        env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(env); env.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function metroScheduler() {
        const bpm = Math.max(40, Math.min(240, parseInt(document.getElementById('bpmInput').value) || 80));
        while (nextTickTime < audioCtx.currentTime + 0.1) {
            playMetroTick();
            nextTickTime += 60.0 / bpm;
        }
        metroTimerID = setTimeout(metroScheduler, 50);
    }

    function toggleMetronome() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isMetroPlaying = !isMetroPlaying;
        const btn = document.getElementById('metroBtn');
        if (isMetroPlaying) {
            nextTickTime = audioCtx.currentTime;
            metroScheduler();
            btn.classList.add('active'); btn.innerText = '停止';
        } else {
            clearTimeout(metroTimerID);
            btn.classList.remove('active'); btn.innerText = '节拍';
        }
    }

    // 这里是你辛苦编配的 E 调原始数据，保持不变
    const rawData = [
        { tag: "第一段", content: [["E","那"], ["","片"], ["","笑"], ["","声"], [" "," "], ["B","让"], ["","我"], ["","想"], ["","起"], [" "," "], ["A","我"], ["","的"], ["","那些"], ["E","花儿"]] },
        { tag: "", content: [["E","在"], ["","我"], ["","生"], ["","命"], ["C#m","每"], ["","个"], ["","角"], ["","落"], [" "," "], ["A","静"], ["","静"], ["","为"], ["","我"], ["","开"], ["B","着"]] },
        { tag: "", content: [["E","我"], ["","曾"], ["","以"], ["","为"], ["B","我"], ["","会"], ["","永"], ["","远"], ["C#m","守"], ["","在"], ["","她"], ["","身"], ["A","旁"]] },
        { tag: "", content: [["E","今"], ["","天"], ["","我"], ["","们"], ["B","已"], ["","经"], ["","离"], ["","去"], [" "," "], ["B","在"], ["","人"], ["","海"], ["","茫"], ["E","茫"]] },
        { tag: "副歌", content: [["E","她"], ["","们"], ["","都"], ["","老"], ["","了"], ["B","吧"], [" "," "], ["C#m","她"], ["","们"], ["","在"], ["","哪"], ["","里"], ["A","呀"]] },
        { tag: "", content: [["E","幸"], ["","运"], ["","的"], ["","是"], ["B","我"], [" "," "], ["","曾"], [" "," "], ["B","陪"], ["","她"], ["","们"], ["","开"], ["E","放"]] },
        { tag: "啦啦啦", content: [["E","啦"], ["","啦"], ["","啦"], ["","啦"], [" "," "], ["B","啦"], ["","啦"], ["","啦"], ["","啦"], [" "," "], ["C#m","啦"], ["","啦"], ["","啦"], ["","想"], ["G#m","她"]] },
        { tag: "", content: [["A","啦"], ["","啦"], ["","啦"], ["","啦"], [" "," "], ["E","啦"], ["","啦"], ["","啦"], ["","啦"], [" "," "], ["C#m","她"], ["","还"], ["","在"], ["","开"], [" "," "], ["B","吗"]] },
        { tag: "", content: [["E","啦"], ["","啦"], ["","啦"], ["","啦"], [" "," "], ["B","啦"], ["","啦"], ["","啦"], ["","啦"], [" "," "], ["C#m","啦"], ["","啦"], ["","啦"], ["","去"], ["G#m","呀"]] },
        { tag: "", content: [["A","她"], ["","们"], ["","已"], ["","经"], ["E","被"], ["","风"], ["","吹"], ["","走"], [" "," "], ["B","散"], ["","落"], ["","在"], ["","天"], ["E","涯"]] }
    ];

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const degrees = ['1', '1#', '2', '2#', '3', '4', '4#', '5', '5#', '6', '6#', '7'];
    let isDegreeMode = false;

    function processChord(chord, steps) {
        if (!chord) return "";
        return chord.replace(/[A-G]#?/g, (match) => {
            let i = notes.indexOf(match);
            return isDegreeMode ? degrees[(i - steps + 12) % 12] : notes[(i + steps + 12) % 12];
        });
    }

    function updateView() {
        const steps = parseInt(document.getElementById('keySelect').value);
        const container = document.getElementById('tabContent');
        container.innerHTML = '';
        rawData.forEach(line => {
            const lineEl = document.createElement('div');
            lineEl.className = 'line';
            line.content.forEach(item => {
                const group = document.createElement('div');
                group.className = 'word-group';
                group.innerHTML = `<div class="chord-box">${processChord(item[0], steps)}</div><div class="lyric-box">${item[1]}</div>`;
                lineEl.appendChild(group);
            });
            container.appendChild(lineEl);
        });
    }

    function toggleDegree() { isDegreeMode = !isDegreeMode; document.getElementById('degreeBtn').classList.toggle('active'); updateView(); }

    const SONG_KEY = 'key_那些花儿';
    function saveKey() { localStorage.setItem(SONG_KEY, document.getElementById('keySelect').value); }
    const savedKey = localStorage.getItem(SONG_KEY);
    if (savedKey !== null) document.getElementById('keySelect').value = savedKey;

    updateView();
</script>
</body>
</html>
