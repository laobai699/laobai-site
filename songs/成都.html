<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成都 - 老拜有谱</title>
    <style>
        /* --- 视觉基因库：深夜暖意系统 --- */
        :root { 
            --page-bg: #111111;
            --module-bg: #141210;
            --content-bg: #151311;
            --border-color: #2a2826;
            --text-main: #f5f1eb;
            --text-sub: #ddd5cc;
            --text-dim: #99938d;
            --accent-color: #c87e4f; /* 柔和铜橘：老拜钦点 */
            --hover-bg: #1a1816;
        }

        body { 
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: var(--page-bg); margin: 0; padding: 0; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        
        /* 1. 导航栏：大字体、高清晰 */
        .navbar { 
            background: var(--module-bg) !important; padding: 0 16px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1002;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-nav { 
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 6px 14px; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none;
        }
        .nav-title { font-weight: 600; font-size: 22px; letter-spacing: 2px; flex: 1; text-align: center; }

        /* 2. 工具栏：约束、不溢出、带迷你节拍器 */
        .controls-wrapper {
            background: var(--module-bg) !important; border-bottom: 1px solid var(--border-color);
            display: flex; overflow-x: auto; white-space: nowrap;
            padding: 8px 12px; gap: 10px; position: sticky; top: 64px; z-index: 1001;
            -webkit-overflow-scrolling: touch; box-sizing: border-box; width: 100%;
        }
        .controls-wrapper::-webkit-scrollbar { display: none; }
        
        select, .btn-tool { 
            flex-shrink: 0; padding: 7px 12px; border-radius: 10px; border: 1px solid var(--border-color); 
            background: var(--content-bg); font-size: 13px; color: var(--text-sub); outline: none;
        }
        .btn-tool.active { background: var(--accent-color) !important; color: white !important; border-color: var(--accent-color); }

        /* 3. 乐谱容器：紧凑精致 */
        #mainContainer { 
            max-width: 550px; margin: 15px auto; background: var(--content-bg); 
            padding: 24px 20px; border-radius: 16px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); position: relative; z-index: 1;
        }

        .line { display: flex; flex-wrap: wrap; margin-bottom: 20px; line-height: 1.2; }
        .word-group { display: inline-flex; flex-direction: column; align-items: center; min-width: 1.1em; margin-right: 1px; }
        .chord-box { color: var(--accent-color); font-weight: bold; font-size: 13px; height: 1.5em; font-family: Arial, sans-serif; }
        .lyric-box { font-size: 17px; color: var(--text-main); font-weight: 500; letter-spacing: 0.5px; }

        /* 4. 底部切换 */
        .song-footer-nav { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .footer-btn { text-decoration: none; color: var(--text-sub); font-size: 14px; border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 12px; background: var(--module-bg); display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body id="bodyTag">

    <div class="navbar">
        <button class="btn-nav" onclick="window.location.href='../songs.html'">⬅ 目录</button>
        <div class="nav-title">老拜有谱</div>
        <div style="width: 70px; flex-shrink: 0;"></div> 
    </div>

    <div class="controls-wrapper">
        <select id="keySelect" onchange="updateView()">
            <option value="0">C 调 (原)</option><option value="1">C#/Db</option><option value="2">D</option><option value="3">D#/Eb</option><option value="4">E</option><option value="5">F</option><option value="6">F#/Gb</option><option value="7">G</option><option value="8">G#/Ab</option><option value="9">A</option><option value="10">A#/Bb</option><option value="11">B</option>
        </select>
        <button id="degreeBtn" class="btn-tool" onclick="toggleDegree()">级数模式</button>
        <button id="fullPageBtn" class="btn-tool" onclick="toggleFullPage()">一页显示</button>
        <button class="btn-tool" onclick="startScroll()">自动滚动</button>
        
        <!-- 迷你节拍器 -->
        <div style="display: flex; align-items: center; gap: 5px; border-left: 1px solid var(--border-color); padding-left: 10px;">
            <input type="number" id="bpmInput" value="80" style="width: 40px; background: #000; border: 1px solid var(--border-color); color: var(--accent-color); border-radius: 5px; padding: 4px; font-size: 12px; text-align: center;">
            <button id="metroBtn" class="btn-tool" onclick="toggleMetronome()" style="min-width: 60px;">⏱️ 节拍</button>
        </div>
    </div>

    <div id="mainContainer">
        <div style="text-align: center; margin-bottom: 25px;">
            <div style="font-size: 20px; font-weight: 500; letter-spacing: 1.5px;">成都</div>
            <div style="font-size: 12px; color: var(--text-dim); margin-top: 4px;">赵雷 · 民谣经典</div>
        </div>

        <div id="tabContent"></div>

        <div class="song-footer-nav">
            <a href="那些花儿.html" class="footer-btn"><span>⇠</span> 那些花儿</a>
            <a href="米店.html" class="footer-btn">米店 <span>⇢</span></a>
        </div>
    </div>

<script>
    // --- 1. 屏幕长亮 (Wake Lock) ---
    let wakeLock = null;
    const requestWakeLock = async () => {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    };
    document.addEventListener('visibilitychange', () => { if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock(); });
    requestWakeLock();

    // --- 2. 迷你节拍器逻辑 ---
    let audioCtx = null;
    let isMetroPlaying = false;
    let nextTickTime = 0;
    let metroTimerID = null;
    function playMetroTick() {
        const osc = audioCtx.createOscillator(); const env = audioCtx.createGain();
        osc.frequency.value = 1000; env.gain.exponentialRampToValueAtTime(1, audioCtx.currentTime);
        env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(env); env.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }
    function metroScheduler() {
        const bpm = parseInt(document.getElementById('bpmInput').value) || 80;
        while (nextTickTime < audioCtx.currentTime + 0.1) { playMetroTick(); nextTickTime += 60.0 / bpm; }
        metroTimerID = setTimeout(metroScheduler, 50);
    }
    function toggleMetronome() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isMetroPlaying = !isMetroPlaying; const btn = document.getElementById('metroBtn');
        if (isMetroPlaying) { nextTickTime = audioCtx.currentTime; metroScheduler(); btn.innerText = "⏹️ 停止"; btn.style.color = "var(--accent-color)"; }
        else { clearTimeout(metroTimerID); btn.innerText = "⏱️ 节拍"; btn.style.color = "var(--text-sub)"; }
    }

    // --- 3. 核心数据与转换 (老拜成都 rawData) ---
    const baseKey = 'C'; 
    const rawData = [
        { content: [["", "让"], ["C", "我"], [" ", " "], ["", "掉"], ["", "下"], ["Em", "眼"], ["", "泪"], ["", "的"], [" ", " "], ["", "不"], ["F", "止"], [" ", " "], ["", "昨"], ["", "夜"], ["", "的"], ["G", "酒"]] },
        { content: [["", "让"], ["C", "我"], [" ", " "], ["", "依"], ["", "依"], ["Em", "不"], ["", "舍"], ["", "的"], [" ", " "], ["", "不"], ["F", "只"], [" ", " "], ["", "你"], ["", "的"], ["", "温"], ["G", "柔"]] },
        { content: [["", "余"], ["Em", "路"], [" ", " "], ["", "还"], ["", "要"], ["Am", "走"], ["", "多"], ["", "久"], [" ", " "], ["", "你"], ["F", "攥"], ["", "着"], ["G", "我"], ["", "的"], ["C", "手"]] },
        { content: [["", "让"], ["Em", "我"], [" ", " "], ["", "感"], ["", "到"], ["F", "为"], ["", "难"], ["", "的"], [" ", " "], ["", "是"], ["G", "挣"], ["", "扎"], ["", "的"], ["", "自"], ["C", "由"]] },
        { content: [["", "分"], ["C", "别"], [" ", " "], ["", "总"], ["", "是"], ["Em", "在"], ["", "九"], ["", "月"], [" ", " "], ["", "回"], ["F", "忆"], ["", "是"], ["", "思"], ["", "念"], ["", "的"], ["G", "愁"]] },
        { content: [["", "深"], ["C", "秋"], [" ", " "], ["", "嫩"], ["", "绿"], ["Em", "的"], ["", "垂"], ["", "柳"], [" ", " "], ["", "亲"], ["F", "吻"], ["", "着"], ["", "我"], ["", "额"], ["G", "头"]] },
        { content: [["", "在"], ["Em", "那"], ["", "座"], ["", "阴"], ["", "雨"], ["", "的"], ["Am", "小"], ["", "城"], ["", "里"], [" ", " "], ["", "我"], ["F", "从"], ["", "未"], ["G", "忘"], ["", "记"], ["C", "你"]] },
        { content: [["", "成"], ["Em", "都"], [" ", " "], ["", "带"], ["", "不"], ["F", "走"], ["", "的"], [" ", " "], ["G", "只"], ["", "有"], ["C", "你"]] },
        { content: [["", "和"], ["C", "我"], ["", "在"], ["", "成"], ["", "都"], ["", "的"], ["Am", "街"], ["", "头"], ["", "走"], ["", "一"], ["F", "走"], [" ", " "], ["", "喔"], ["", "…"], ["G", "喔"], ["C", ""]] },
        { content: [["", "直"], ["C", "到"], ["", "所"], ["", "有"], ["", "的"], ["Am", "灯"], ["", "都"], ["", "熄"], ["", "灭"], ["", "了"], ["", "也"], ["", "不"], ["F", "停"], ["", "留"], ["G", ""]] },
        { content: [["", "你"], ["", "会"], ["F", "挽"], ["", "着"], ["", "我"], ["", "得"], ["", "衣"], ["C", "袖"], [" ", " "], ["", "我"], ["", "会"], ["F", "把"], ["", "手"], ["", "揣"], ["", "进"], ["", "裤"], ["C", "兜"]] },
        { content: [["", "走"], ["Dm", "到"], ["", "玉"], ["", "林"], ["", "路"], ["", "的"], ["Dm", "尽"], ["", "头"], [" ", " "], ["", "坐"], ["Dm", "在"], ["", "小"], ["", "酒"], ["", "馆"], ["", "的"], ["", "门"], ["G", "口"]] }
    ];

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const degrees = ['1', '1#', '2', '2#', '3', '4', '4#', '5', '5#', '6', '6#', '7'];
    let isDegreeMode = false;

    function processChord(chord, targetKeyIndex) {
        if (!chord) return "";
        const baseKeyIndex = notes.indexOf(baseKey);
        const offset = (targetKeyIndex - baseKeyIndex + 12) % 12;
        return chord.replace(/[A-G]#?/g, (match) => {
            let i = notes.indexOf(match);
            return isDegreeMode ? degrees[(i - baseKeyIndex - offset + 24) % 12] : notes[(i + offset) % 12];
        });
    }

    function updateView() {
        const target = parseInt(document.getElementById('keySelect').value);
        const container = document.getElementById('tabContent'); container.innerHTML = '';
        rawData.forEach(line => {
            const lineEl = document.createElement('div'); lineEl.className = 'line';
            line.content.forEach(item => {
                const group = document.createElement('div'); group.className = 'word-group';
                group.innerHTML = `<div class="chord-box">${processChord(item[0], target)}</div><div class="lyric-box">${item[1]}</div>`;
                lineEl.appendChild(group);
            });
            container.appendChild(lineEl);
        });
    }

    function toggleDegree() { isDegreeMode = !isDegreeMode; document.getElementById('degreeBtn').classList.toggle('active'); updateView(); }
    function toggleFullPage() { document.getElementById('bodyTag').classList.toggle('full-mode'); document.getElementById('fullPageBtn').classList.toggle('active'); }
    let scrollJob;
    function startScroll() {
        if (scrollJob) { clearInterval(scrollJob); scrollJob = null; }
        else { scrollJob = setInterval(() => window.scrollBy(0, 1), 60); }
    }
    updateView();
</script>
</body>
</html>
